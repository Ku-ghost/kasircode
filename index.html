<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Kiosk & POS Mandiri</title>
    
    <meta name="theme-color" content="#120E0B">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        coffee: {
                            900: '#120E0B', 
                            850: '#171310', 
                            800: '#1E1814', 
                            700: '#2A231E', 
                        },
                        neon: {
                            blue: '#00f0ff',   
                            purple: '#bc13fe', 
                            green: '#39ff14'   
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    boxShadow: {
                        'neon-blue': '0 0 15px rgba(0, 240, 255, 0.4)',
                        'neon-blue-hover': '0 0 25px rgba(0, 240, 255, 0.7)',
                        'neon-purple': '0 0 15px rgba(188, 19, 254, 0.4)',

                    }
                }
            }
        }
    </script>

    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 240, 255, 0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0, 240, 255, 0.6); }

        .glass-panel {
            background: rgba(30, 24, 20, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 240, 255, 0.15);
        }

        .glass-button {
            background: rgba(0, 240, 255, 0.08);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(0, 240, 255, 0.3);
            transition: all 0.3s ease;
        }
        
        .glass-button:hover:not(:disabled) {
            background: rgba(0, 240, 255, 0.2);
            border-color: rgba(0, 240, 255, 0.8);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.5);
        }

        .glow-input:focus {
            border-color: #00f0ff;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        .animate-float { animation: float 3s ease-in-out infinite; }

        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        body { user-select: none; }
    </style>
</head>
<body class="bg-coffee-900 text-gray-200 h-screen w-screen overflow-hidden antialiased">

    <div id="app" class="h-full w-full relative"></div>
    
    <div id="modal-container" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/80 backdrop-blur-sm animate-fade-in"></div>

    <script>
        /**
         * =======================================================================
         * 1. VARIABEL IDENTITAS SCRIPT & KONSTANTA LISENSI
         * =======================================================================
         */
        const APP_ID = "SMARTPOS_UKM_01";
        const SALT_KEY = "kugoskom"; 
        const BYPASS_LICENSE_FOR_PREVIEW = true; 

        // TARGET ENDPOINT CLOUDFLARE WORKERS UTAMA (Sesuaikan jika URL worker Anda berbeda)
        const API_BASE_URL = "https://kasirmandiri.ku-ghost.workers.dev/api/gate";

        /**
         * =======================================================================
         * SYSTEM TOAST, CONFIRMATION & CUSTOM MODAL
         * =======================================================================
         */
        function showCustomToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-24 left-1/2 -translate-x-1/2 z-50 glass-panel px-6 py-3 rounded-xl border flex items-center gap-3 animate-fade-in shadow-neon-blue ${
                type === 'error' ? 'border-red-500/50 text-red-400 bg-red-950/90' : 'border-neon-blue/50 text-neon-blue bg-[#1e1814]/90'
            }`;
            toast.innerHTML = `<i class="fas ${type === 'error' ? 'fa-triangle-exclamation' : 'fa-check-circle'}"></i> <span class="font-bold text-sm tracking-wide">${message}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('opacity-0', 'transition-opacity', 'duration-300');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function showCustomConfirm(title, message, onConfirm) {
            ModalSystem.show(`
                <div class="glass-panel p-8 rounded-3xl w-11/12 max-w-sm text-center border-neon-blue/20 shadow-neon-blue animate-fade-in">
                    <i class="fas fa-circle-question text-4xl text-neon-blue mb-4 animate-bounce"></i>
                    <h3 class="text-xl font-bold text-white mb-2">${title}</h3>
                    <p class="text-gray-400 text-sm mb-6">${message}</p>
                    <div class="flex gap-3">
                        <button onclick="ModalSystem.hide()" class="flex-1 py-2.5 rounded-xl border border-white/10 text-gray-400 hover:text-white hover:bg-white/5 font-semibold transition-colors">Batal</button>
                        <button id="confirm-btn-trigger" class="flex-1 py-2.5 rounded-xl bg-neon-blue text-coffee-900 font-black hover:shadow-neon-blue-hover transition-all">Konfirmasi</button>
                    </div>
                </div>
            `);
            document.getElementById('confirm-btn-trigger').onclick = () => {
                ModalSystem.hide();
                onConfirm();
            };
        }

        /**
         * ==========================================
         * 2. STATE MANAGEMENT & AUTO-CREATE DATABASE
         * ==========================================
         */
        const DatabaseManager = {
            dbKey: APP_ID + '_local_db',
            
            init: function() {
                let localData = localStorage.getItem(this.dbKey);
                if (!localData) {
                    const defaultDB = {
                        settings: {
                            storeName: 'Kasir Mandiri Kiosk', 
                            storeSlogan: 'Sistem Pemesanan Cepat & Mudah', 
                            adminPin: '1234',
                            taxRate: 0.10,
                            numTables: 12,
                            webhookKitchen: '', 
                            webhookCashier: '',
                            storeStatus: 'open', 
                            promos: [
                                "https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=800&q=80",
                                "https://images.unsplash.com/photo-1514432324607-a09d9b4aefdd?auto=format&fit=crop&w=800&q=80"
                            ]
                        },
                        categories: ['Minuman', 'Makanan', 'Snack'],
                        products: [
                            { id: 'P01', name: 'Signature Coffee Aren', price: 25000, category: 'Minuman', status: 'ready', image: 'fa-mug-hot' },
                            { id: 'P02', name: 'Cyber Matcha Latte', price: 28000, category: 'Minuman', status: 'ready', image: 'fa-glass-water' },
                            { id: 'P03', name: 'Nasi Goreng Wagyu', price: 45000, category: 'Makanan', status: 'ready', image: 'fa-bowl-food' },
                            { id: 'P04', name: 'Truffle French Fries', price: 22000, category: 'Snack', status: 'ready', image: 'fa-plate-wheat' },
                            { id: 'P05', name: 'Neon Citrus Mojito', price: 24000, category: 'Minuman', status: 'habis', image: 'fa-martini-glass-citrus' },
                            { id: 'P06', name: 'Spaghetti Carbonara', price: 38000, category: 'Makanan', status: 'ready', image: 'fa-utensils' }
                        ],
                        activeOrders: [],
                        orderHistory: []
                    };
                    this.save(defaultDB);
                    return defaultDB;
                }
                return JSON.parse(localData);
            },
            save: function(dataObj) {
                localStorage.setItem(this.dbKey, JSON.stringify(dataObj));
            },
            syncState: function() {
                this.save({
                    settings: AppState.settings,
                    categories: AppState.categories,
                    products: AppState.products,
                    activeOrders: AppState.activeOrders,
                    orderHistory: AppState.orderHistory
                });
            }
        };

        const savedDB = DatabaseManager.init();
        const licenseMeta = JSON.parse(localStorage.getItem(APP_ID + '_license_meta') || '{}');
        const AppState = {
            settings: savedDB.settings,
            categories: savedDB.categories || ['Minuman', 'Makanan', 'Snack'],
            products: savedDB.products,
            activeOrders: savedDB.activeOrders || [],
            orderHistory: savedDB.orderHistory || [],
            cart: [],
            currentTable: null,
            viewMode: 'landing',
            currentTableStatus: 'vacant', // vacant, ordering, locked, done
            activeOrderDetails: null,     // data nota/pesanan aktif meja ini
            store_reg_name: licenseMeta.regName || 'kasirmandiri_ukm' 
        };

        const formatRp = (num) => 'Rp ' + num.toLocaleString('id-ID');

        /**
         * =======================================================================
         * 3. SINKRONISASI CLOUDFLARE WORKER DATABASE (ANTI-FAIL BACKOFF)
         * =======================================================================
         */
        async function syncToCloud(action, payload = {}) {
            const token = localStorage.getItem(APP_ID + '_kasir_password') || "PREVIEW_TOKEN";
            let retries = 5;
            let delay = 1000;

            while (retries > 0) {
                try {
                    const response = await fetch(API_BASE_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            app_id: APP_ID,
                            store_reg_name: AppState.store_reg_name,
                            auth_token: token,
                            action: action,
                            payload: payload
                        })
                    });
                    if (!response.ok) throw new Error("Respons Server Gagal");
                    return await response.json();
                } catch (err) {
                    retries--;
                    if (retries === 0) {
                        console.error("Gagal sinkronisasi data setelah 5 percobaan.");
                        return { error: err.message };
                    }
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2; // Exponential Backoff
                }
            }
        }

        const BackupManager = {
            exportJSON: function() {
                const currentDB = localStorage.getItem(DatabaseManager.dbKey);
                if(!currentDB) return showCustomToast("Database kosong!", "error");
                
                const blob = new Blob([currentDB], {type: 'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Backup_POS_${new Date().toISOString().slice(0,10)}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showCustomToast("Database berhasil diekspor!");
            }
        };

        /**
         * =======================================================================
         * 4. REAL-TIME SERVER POLLING & REDIRECT KE NOTA DIGITAL (KEAMANAN)
         * =======================================================================
         */
        let statusPollingId = null;

        function startTableStatusPolling(tableId) {
            if (statusPollingId) clearInterval(statusPollingId);
            if (!tableId) return;

            statusPollingId = setInterval(async () => {
                const res = await syncToCloud('check_table_status', { table_id: tableId });
                if (res && !res.error) {
                    const prevStatus = AppState.currentTableStatus;
                    AppState.currentTableStatus = res.status;
                    AppState.activeOrderDetails = res.order;

                    // Deteksi perubahan status meja secara real-time
                    if (prevStatus !== res.status) {
                        console.log(`Status meja ${tableId} berubah: ${prevStatus} -> ${res.status}`);
                        handleTableStatusTransition(res.status);
                    }
                }
            }, 5000); // Polling berkala setiap 5 detik
        }

        function stopTableStatusPolling() {
            if (statusPollingId) {
                clearInterval(statusPollingId);
                statusPollingId = null;
            }
        }

        function handleTableStatusTransition(status) {
            // Evaluasi logika navigasi berdasarkan status meja server
            if (status === 'locked') {
                renderLockedScreen();
            } else if (status === 'done') {
                renderDigitalReceiptScreen();
            } else if (status === 'vacant' || status === 'ordering') {
                // Sesi dikosongkan oleh kasir, muat ulang menu kiosk untuk pemesanan baru
                renderCustomerKiosk();
            }
        }

        /**
         * ==========================================
         * 5. ROUTING & URL SECURITY CONTROLLER
         * ==========================================
         */
        async function initRouter() {
            const params = new URLSearchParams(window.location.search);
            const currentUrlPath = window.location.pathname;

            // KEAMANAN KETAT: Jika tidak ada parameter apa pun di tautan pelanggan
            if (!params.has('view') && !params.has('table')) {
                navigateTo('landing');
                return;
            }

            if (params.has('view') && params.get('view') === 'admin') {
                stopTableStatusPolling();
                navigateTo('admin');
            } else if (params.has('table')) {
                const tableId = params.get('table');
                AppState.currentTable = tableId;
                
                // Mulai validasi sisi server (D1)
                const res = await syncToCloud('check_table_status', { table_id: tableId });
                if (res && !res.error) {
                    AppState.currentTableStatus = res.status;
                    AppState.activeOrderDetails = res.order;
                    
                    // Aktifkan Background Worker Polling untuk mendeteksi Kasir Klik "Selesai"
                    startTableStatusPolling(tableId);

                    if (AppState.settings.storeStatus === 'closed') {
                        renderStoreClosedScreen();
                    } else if (res.status === 'locked') {
                        renderLockedScreen();
                    } else if (res.status === 'done') {
                        renderDigitalReceiptScreen();
                    } else {
                        renderCustomerKiosk();
                    }
                } else {
                    // Fail-safe jika worker gagal terhubung, gunakan mode lokal
                    renderCustomerKiosk();
                }
            } else {
                navigateTo('landing');
            }
        }

        function navigateTo(mode, payload) {
            if (mode === 'admin') {
                AppState.viewMode = 'admin';
                history.pushState(null, '', '?view=admin');
                renderAdminLogin();
            } else if (mode === 'table') {
                AppState.viewMode = 'customer';
                AppState.currentTable = payload;
                history.pushState(null, '', '?table=' + payload);
                initRouter();
            } else {
                AppState.viewMode = 'landing';
                history.pushState(null, '', window.location.pathname || '/');
                renderLandingPage();
            }
        }

        function renderStoreClosedScreen() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="h-screen w-screen bg-coffee-900 flex flex-col items-center justify-center p-6 text-center">
                    <div class="glass-panel p-10 rounded-3xl max-w-sm w-full border-red-500/20 shadow-neon-blue">
                        <i class="fas fa-store-slash text-5xl text-red-500 mb-6 animate-pulse"></i>
                        <h2 class="text-2xl font-black text-white uppercase tracking-wider mb-2">OUTLET TUTUP</h2>
                        <p class="text-gray-300 text-sm mb-8">Maaf, saat ini outlet kami sedang tutup. Silakan hubungi staf.</p>
                        <button onclick="navigateTo('landing')" class="w-full py-2.5 rounded-xl bg-white/5 text-white font-bold text-xs border border-white/10">Kembali</button>
                    </div>
                </div>
            `;
        }

        /**
         * ==========================================
         * 6. SUBMISSION TRANSAKSI POS UTAMA
         * ==========================================
         */
        async function processOrderSubmission(customerName, isTakeAway = false) {
            if (AppState.cart.length === 0) return;

            const timeNow = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            const name = customerName || "Pelanggan Tanpa Nama";
            const tableId = isTakeAway ? "TAKE-AWAY" : AppState.currentTable;

            let subtotal = 0;
            const itemsPayload = AppState.cart.map(item => {
                const prod = AppState.products.find(p => p.id === item.id);
                subtotal += (prod ? prod.price : 0) * item.qty;
                return {
                    id: item.id,
                    name: prod ? prod.name : 'Produk',
                    qty: item.qty,
                    price: prod ? prod.price : 0
                };
            });

            const tax = subtotal * AppState.settings.taxRate;
            const totalFinal = subtotal + tax;

            const orderPayload = {
                order_id: 'ORD-' + Math.floor(100000 + Math.random() * 900000),
                table_number: tableId,
                total_amount: totalFinal,
                order_time: timeNow,
                customer_name: name,
                items: itemsPayload
            };
            
            // Simpan pesanan ke database Cloudflare D1
            const response = await syncToCloud('insert_order', orderPayload);

            if (response && !response.error) {
                AppState.cart = [];
                AppState.currentTableStatus = 'locked';
                
                // Tampilkan Modal Sukses & Terapkan Layar Kunci
                ModalSystem.show(`
                    <div class="glass-panel p-8 rounded-3xl w-11/12 max-w-sm text-center shadow-neon-blue border-neon-blue/20">
                        <i class="fas fa-check-circle text-5xl text-neon-green mb-4 animate-bounce"></i>
                        <h2 class="text-xl font-black text-white mb-4">PESANAN TERKIRIM!</h2>
                        <p class="text-gray-300 text-sm mb-6 leading-relaxed">
                            Pesanan Anda telah diterima. Silakan bersabar menunggu pesanan Anda diantarkan.<br><br>
                            <span class="text-neon-blue font-bold">Harap segera lakukan pembayaran di Kasir sebelum meninggalkan tempat. Terima kasih!</span>
                        </p>
                        <button onclick="ModalSystem.hide(); initRouter();" class="w-full py-3 bg-neon-blue text-coffee-900 font-bold rounded-xl shadow-neon-blue-hover hover:scale-105 transition-all">Mengerti</button>
                    </div>
                `);
            } else {
                showCustomToast("Gagal mengirim pesanan ke server. Coba lagi.", "error");
            }
        }

        /**
         * ==========================================
         * 7. LAYAR KUNCI & NOTA DIGITAL INTERAKTIF
         * ==========================================
         */
        function renderLockedScreen() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="h-screen w-screen bg-coffee-900 flex flex-col items-center justify-center p-6 text-center">
                    <div class="glass-panel p-10 rounded-3xl max-w-sm w-full border-neon-blue/25 shadow-neon-blue animate-fade-in">
                        <div class="w-20 h-20 bg-neon-purple/20 border border-neon-purple/50 rounded-full flex items-center justify-center mx-auto mb-6">
                            <i class="fas fa-clock text-3xl text-neon-purple animate-pulse"></i>
                        </div>
                        <h2 class="text-xl font-black text-white uppercase mb-4 tracking-wide">PESANAN SEDANG DIPROSES</h2>
                        <div class="bg-black/40 border border-white/5 py-2 px-4 rounded-xl inline-block mb-6">
                            <span class="text-neon-blue font-black tracking-widest text-base">${AppState.currentTable}</span>
                        </div>
                        <p class="text-gray-300 text-sm leading-relaxed mb-6">
                            Pesanan telah diterima, silakan bersabar menunggu pesanan diantarkan.<br><br>
                            Sebelum meninggalkan tempat, silakan melakukan pembayaran di kasir.<br>Terima kasih!
                        </p>
                        <p class="text-xs text-gray-500 font-mono">Layar dikunci otomatis demi keamanan transaksi.</p>
                    </div>
                </div>
            `;
        }

        function renderDigitalReceiptScreen() {
            const app = document.getElementById('app');
            const order = AppState.activeOrderDetails;
            if (!order) {
                app.innerHTML = `<div class="h-screen w-screen bg-coffee-900 flex items-center justify-center"><p class="text-gray-400">Memuat Nota Digital...</p></div>`;
                return;
            }

            app.innerHTML = `
                <div class="h-screen w-screen bg-coffee-900 flex flex-col items-center justify-center p-6 overflow-y-auto">
                    <div class="glass-panel p-8 rounded-3xl max-w-sm w-full border-neon-purple/30 shadow-neon-purple animate-fade-in relative">
                        <div class="w-full h-32 rounded-2xl overflow-hidden mb-6 border border-white/5 bg-coffee-850">
                            <img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=800&q=80" class="w-full h-full object-cover" alt="Thank You Banner">
                        </div>

                        <div class="text-center mb-6">
                            <span class="text-neon-green bg-neon-green/10 border border-neon-green/30 text-[10px] font-black uppercase px-3 py-1 rounded-full">TRANSAKSI SELESAI / LUNAS</span>
                            <h2 class="text-2xl font-black text-white mt-4 tracking-wider uppercase">NOTA DIGITAL</h2>
                            <p class="text-xs text-gray-400 mt-1">ID: ${order.order_id}</p>
                        </div>

                        <div class="border-t border-b border-white/10 py-4 mb-6 space-y-2 max-h-48 overflow-y-auto pr-1">
                            ${order.items.map(it => `
                                <div class="flex justify-between text-xs text-gray-300">
                                    <span>${it.qty}x ${it.name}</span>
                                    <span class="font-mono">${formatRp(it.price * it.qty)}</span>
                                </div>
                            `).join('')}
                        </div>

                        <div class="space-y-2 mb-6">
                            <div class="flex justify-between text-xs text-gray-400"><span>Subtotal</span><span class="font-mono">${formatRp(order.subtotal || (order.total_amount * 0.9))}</span></div>
                            <div class="flex justify-between text-xs text-gray-400"><span>Pajak</span><span class="font-mono">${formatRp(order.tax || (order.total_amount * 0.1))}</span></div>
                            <div class="flex justify-between text-base font-bold text-white pt-2 border-t border-white/5">
                                <span>TOTAL BAYAR</span>
                                <span class="text-neon-blue font-mono">${formatRp(order.total_amount)}</span>
                            </div>
                        </div>

                        <div class="text-center p-4 bg-black/40 rounded-2xl border border-white/5">
                            <p class="text-xs text-neon-blue font-bold">Terima kasih atas kunjungan Anda!</p>
                            <p class="text-[10px] text-gray-400 mt-1">Simpan atau screenshot layar ini sebagai bukti pembayaran digital.</p>
                        </div>
                    </div>
                </div>
            `;
        }

        /**
         * =======================================================================
         * 8. MENU UTAMA KIOSK & RESPONSIVE PROMO BANNER (MOBILE FIXED)
         * =======================================================================
         */
        let promoIntervalId = null;
        function initPromoSlider() {
            if (promoIntervalId) clearInterval(promoIntervalId);
            const slides = document.querySelectorAll('.promo-slide');
            const dots = document.querySelectorAll('.promo-dot');
            if (slides.length <= 1) return;
            
            let currentIdx = 0;
            promoIntervalId = setInterval(() => {
                slides[currentIdx].classList.add('opacity-0');
                slides[currentIdx].classList.remove('opacity-100');
                slides[currentIdx].style.zIndex = 0;
                if (dots[currentIdx]) {
                    dots[currentIdx].classList.remove('bg-neon-blue');
                    dots[currentIdx].classList.add('bg-white/30');
                }
                
                currentIdx = (currentIdx + 1) % slides.length;
                
                slides[currentIdx].classList.remove('opacity-0');
                slides[currentIdx].classList.add('opacity-100');
                slides[currentIdx].style.zIndex = 10;
                if (dots[currentIdx]) {
                    dots[currentIdx].classList.add('bg-neon-blue');
                    dots[currentIdx].classList.remove('bg-white/30');
                }
            }, 5000);
        }

        function renderCustomerKiosk() {
            const app = document.getElementById('app');
            const promos = AppState.settings.promos || [];
            let promoHTML = '';
            
            // FIX OPTIMASI: Banner Iklan dengan batasan tinggi tetap & responsif (overflow-hidden)
            if (promos.length > 0) {
                promoHTML = `
                    <div class="relative w-full h-32 sm:h-40 md:h-52 lg:h-60 rounded-2xl overflow-hidden mb-6 border border-white/5 bg-coffee-850 shadow-neon-blue/10">
                        ${promos.map((url, i) => `

        function getCartItemControls(productId, isHabis) {
            if (isHabis) return `<button disabled class="w-full py-1.5 rounded-lg bg-white/5 text-gray-500 text-xs">Habis</button>`;
            const cartItem = AppState.cart.find(item => item.id === productId);
            if (!cartItem) return `<button onclick="addToCart('${productId}')" class="w-full py-1.5 rounded-lg glass-button text-white font-medium hover:text-neon-blue flex items-center justify-center gap-1.5 transition-all text-xs"><i class="fas fa-plus text-[10px]"></i> Tambah</button>`;
            return `
                <div class="flex items-center justify-between bg-white/5 border border-neon-blue/30 rounded-lg p-0.5">
                    <button onclick="updateQty('${productId}', -1)" class="w-7 h-7 rounded text-gray-400 hover:text-white flex items-center justify-center"><i class="fas fa-minus text-[10px]"></i></button>
                    <span class="font-bold text-neon-blue text-xs">${cartItem.qty}</span>
                    <button onclick="updateQty('${productId}', 1)" class="w-7 h-7 rounded text-gray-400 hover:text-white flex items-center justify-center"><i class="fas fa-plus text-[10px]"></i></button>
                </div>`;
        }

        function updateCartDisplay() {
            const cartContainer = document.getElementById('cart-items');
            const btnCheckout = document.getElementById('btn-checkout');
            const fabBadge = document.getElementById('fab-badge');
            if (!cartContainer) return;

            if (AppState.cart.length === 0) {
                cartContainer.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-gray-500 opacity-50"><i class="fas fa-basket-shopping text-5xl mb-4"></i><p class="text-sm">Keranjang kosong</p></div>`;
                document.getElementById('cart-subtotal').innerText = formatRp(0);
                document.getElementById('cart-tax').innerText = formatRp(0);
                document.getElementById('cart-total').innerText = formatRp(0);
                if(fabBadge) fabBadge.innerText = `0 Item`;
                btnCheckout.disabled = true; return;
            }

            let subtotal = 0; let totalQty = 0;
            cartContainer.innerHTML = AppState.cart.map(item => {
                const product = AppState.products.find(p => p.id === item.id);
                if(!product) return ''; subtotal += product.price * item.qty; totalQty += item.qty;
                return `
                    <div class="glass-panel rounded-xl p-3 flex justify-between items-center border-white/5">
                        <div class="flex-1"><h4 class="text-white text-sm font-semibold truncate pr-2">${product.name}</h4><p class="text-neon-blue text-xs mt-1">${formatRp(product.price)}</p></div>
                        <div class="flex items-center gap-2 bg-coffee-900 rounded-lg p-1 border border-white/10">
                            <button onclick="updateQty('${item.id}', -1)" class="w-6 h-6 rounded flex items-center justify-center text-gray-400 hover:text-white"><i class="fas fa-minus text-xs"></i></button>
                            <span class="w-4 text-center text-sm font-bold text-neon-blue">${item.qty}</span>
                            <button onclick="updateQty('${item.id}', 1)" class="w-6 h-6 rounded flex items-center justify-center text-gray-400 hover:text-white"><i class="fas fa-plus text-xs"></i></button>
                        </div>
                    </div>`;
            }).join('');

            const tax = subtotal * AppState.settings.taxRate;
            document.getElementById('cart-subtotal').innerText = formatRp(subtotal);
            document.getElementById('cart-tax').innerText = formatRp(tax);
            document.getElementById('cart-total').innerText = formatRp(subtotal + tax);
            if(fabBadge) fabBadge.innerText = `${totalQty} Item | ${formatRp(subtotal + tax)}`;
            btnCheckout.disabled = false;
        }

        function addToCart(id) { AppState.cart.push({ id, qty: 1 }); updateMenuDisplay(); updateCartDisplay(); }
        function updateQty(id, delta) {
            const itemIndex = AppState.cart.findIndex(i => i.id === id);
            if (itemIndex > -1) { AppState.cart[itemIndex].qty += delta; if (AppState.cart[itemIndex].qty <= 0) AppState.cart.splice(itemIndex, 1); }
            updateMenuDisplay(); updateCartDisplay();
        }

                        <span class="text-xs text-gray-400">Kasir memegang kontrol penuh untuk merestart sesi / menendang meja</span>
                    </div>
                    <div class="p-5 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
                        
                        ${(() => {
                            const ta = tablesStatus['TAKE-AWAY'] || { status: 'vacant' };
                            let statusColor = "border-neon-green/30 bg-neon-green/5";
                            let statusText = "Ready / Kosong";
                            let statusTextClass = "text-neon-green";
                            
                            if (ta.status === 'locked') {
                                statusColor = "border-yellow-500/30 bg-yellow-500/5";
                                statusText = "Menunggu Bayar";
                                statusTextClass = "text-yellow-500";
                            } else if (ta.status === 'done') {
                                statusColor = "border-neon-purple/40 bg-neon-purple/5";
                                statusText = "Nota Selesai";
                                statusTextClass = "text-neon-purple";
                            }

                            return `
                                <div class="border ${statusColor} rounded-2xl p-4 flex flex-col justify-between items-center text-center">
                                    <div><span class="text-[9px] font-bold text-gray-400">TAKE AWAY</span><p class="text-xl font-black ${statusTextClass}">🥡 Bawa Pulang</p></div>
                                    <div class="mt-4 w-full">
                                        <span class="block text-[9px] ${statusTextClass} font-black uppercase mb-2.5">${statusText}</span>
                                        ${ta.status !== 'vacant' ? `
                                            <button onclick="adminResetMeja('TAKE-AWAY')" class="w-full py-1.5 bg-neon-purple/10 hover:bg-neon-purple hover:text-coffee-900 text-neon-purple text-[10px] font-black rounded-xl border border-neon-purple/30 transition-all uppercase"><i class="fas fa-trash-can mr-1"></i> Kosongkan</button>
                                        ` : `
                                            <div class="w-full py-1.5 bg-white/5 border border-white/5 text-[10px] text-gray-500 rounded-xl cursor-not-allowed">Ready</div>
                                        `}
                                    </div>
                                </div>
                            `;
                        })()}

                        ${Array.from({length: AppState.settings.numTables || 6}, (_, i) => {
                            const tId = `M-${i+1}`;
                            const ts = tablesStatus[tId] || { status: 'vacant' };
                            let statusColor = "border-neon-green/30 bg-neon-green/5";
                            let statusText = "Kosong";
                            let statusTextClass = "text-neon-green";
                            
                            if (ts.status === 'ordering') {
                                statusColor = "border-yellow-500/30 bg-yellow-500/5";
                                statusText = "Sedang Memilih";
                                statusTextClass = "text-yellow-500";
                            } else if (ts.status === 'locked') {
                                statusColor = "border-red-500/30 bg-red-500/5";
                                statusText = "Pesanan Dikirim";
                                statusTextClass = "text-red-400";
                            } else if (ts.status === 'done') {
                                statusColor = "border-neon-purple/40 bg-neon-purple/5";
                                statusText = "Nota Digital Aktif";
                                statusTextClass = "text-neon-purple";
                            }

                            return `
                                <div class="border ${statusColor} rounded-2xl p-4 flex flex-col justify-between items-center text-center">
                                    <div><span class="text-[9px] font-bold text-gray-400">MEJA</span><p class="text-2xl font-black ${statusTextClass}">${tId}</p></div>
                                    <div class="mt-4 w-full">
                                        <span class="block text-[9px] ${statusTextClass} font-black uppercase mb-2.5">${statusText}</span>
                                        ${ts.status !== 'vacant' ? `
                                            <button onclick="adminResetMeja('${tId}')" class="w-full py-1.5 bg-neon-purple/10 hover:bg-neon-purple hover:text-coffee-900 text-neon-purple text-[10px] font-black rounded-xl border border-neon-purple/30 transition-all uppercase"><i class="fas fa-trash-can mr-1"></i> Kosongkan</button>
                                        ` : `
                                            <div class="w-full py-1.5 bg-white/5 border border-white/5 text-[10px] text-gray-500 rounded-xl cursor-not-allowed">Standby</div>
                                        `}
                                    </div>
                                </div>`;
                        }).join('')}
                    </div>
                </div>

                <div class="glass-panel rounded-2xl overflow-hidden border border-white/5 animate-fade-in">
                    <div class="p-4 border-b border-white/5 bg-black/20 flex justify-between items-center">
                        <h3 class="font-bold text-white"><i class="fas fa-cash-register text-neon-blue mr-2"></i>Konfirmasi Pembayaran Kasir</h3>
                    </div>
                    ${activeOrders.length === 0 ? `
                        <div class="p-12 text-center text-gray-500"><p class="text-sm">Tidak ada antrian pesanan aktif. Dapur dan Kasir aman!</p></div>
                    ` : `
                        <div class="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            ${activeOrders.map(o => {
                                return `
                                    <div class="bg-coffee-800 border border-white/5 rounded-2xl p-5 relative flex flex-col justify-between">
                                        <div class="absolute top-0 right-0 bg-neon-blue text-coffee-900 px-3 py-1 text-xs font-black rounded-bl-xl uppercase">${o.table_id}</div>
                                        <div>
                                            <p class="text-[10px] text-gray-400 font-mono mb-1">ID: ${o.order_id}</p>
                                            <h4 class="text-base font-black text-neon-blue mb-1">👤 ${o.customer_name}</h4>
                                            <h3 class="text-lg font-bold text-white mb-3">${formatRp(o.total_amount)}</h3>
                                            <div class="space-y-1.5 mb-6 max-h-32 overflow-y-auto border-t border-white/5 pt-2">
                                                ${o.items.map(item => `
                                                    <div class="flex justify-between text-xs text-gray-300">
                                                        <span>${item.qty}x ${item.name}</span>
                                                    </div>
                                                `).join('')}
                                            </div>
                                        </div>
                                        <button onclick="adminSelesaikanPesanan('${o.order_id}', '${o.table_id}')" class="w-full py-2.5 bg-neon-green/10 hover:bg-neon-green hover:text-coffee-900 text-neon-green text-xs font-bold rounded-xl border border-neon-green/30 transition-all">
                                            <i class="fas fa-check mr-1.5"></i> Selesaikan & Terbitkan Nota
                                        </button>
                                    </div>`;
                            }).join('')}
                        </div>`}
                </div>`;

            window.adminResetMeja = (tableId) => {
                showCustomConfirm("Kosongkan Sesi Meja?", `Apakah Anda yakin ingin mengosongkan sesi ${tableId}? Layar HP pelanggan akan langsung didepak kembali ke menu utama.`, async () => {
                    const res = await syncToCloud('reset_table', { table_id: tableId });
                    if(res && !res.error) {
                        showCustomToast(`Sesi ${tableId} telah berhasil dikosongkan!`);
                        renderAdminDashboard();
                    }
                });
            };

            window.adminSelesaikanPesanan = (orderId, tableId) => {
                showCustomConfirm("Konfirmasi Pembayaran?", "Kasir memvalidasi pembayaran pelanggan ini. Layar HP pelanggan akan langsung berubah menjadi Nota Digital Lunas secara real-time.", async () => {
                    const res = await syncToCloud('update_order_status', { order_id: orderId, status: 'completed', table_id: tableId });
                    if (res && !res.error) {
                        showCustomToast("Transaksi Lunas! Sesi Meja dipindahkan ke halaman Nota Digital.");
                        renderAdminDashboard();
                    }
                });
            };
        }

        function renderAdminProducts(container) {
            container.innerHTML = `
                <div class="flex flex-col lg:flex-row gap-8 animate-fade-in">
                    <div class="w-full lg:w-1/3 space-y-6">
                        <div class="glass-panel p-6 rounded-2xl border border-white/5">
                            <h3 class="text-lg font-bold text-white mb-4 flex items-center justify-between">
                                <span>Manajemen Kategori</span>
                                <button onclick="addNewCategoryPrompt()" class="px-2 py-1 bg-neon-blue text-coffee-900 text-xs font-bold rounded-lg"><i class="fas fa-plus"></i></button>
                            </h3>
                            <div class="space-y-2 max-h-80 overflow-y-auto" id="categories-list">
                                ${AppState.categories.map(cat => `
                                    <div class="flex justify-between items-center bg-white/5 rounded-xl px-4 py-2">
                                        <span class="text-sm font-medium text-gray-200">${cat}</span>
                                        <button onclick="deleteCategoryAction('${cat}')" class="text-red-400 text-xs hover:text-red-300"><i class="fas fa-trash-can"></i></button>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>

                    <div class="w-full lg:w-2/3 space-y-6">
                        <div class="glass-panel p-6 rounded-2xl border border-white/5">
                            <div class="flex justify-between items-center mb-6">
                                <h3 class="text-lg font-bold text-white">Daftar Menu Hidangan</h3>
                                <button onclick="addNewProductModal()" class="px-4 py-2 bg-gradient-to-r from-neon-blue to-neon-purple text-coffee-900 text-xs font-black rounded-xl hover:scale-105 transition-all">Tambah Menu Baru</button>
                            </div>
                            <div class="overflow-x-auto">
                                <table class="w-full text-left text-sm text-gray-300">
                                    <thead class="bg-black/40 text-xs uppercase border-b border-white/5">
                                        <tr><th class="px-6 py-4">Menu</th><th class="px-6 py-4">Kategori</th><th class="px-6 py-4">Harga</th><th class="px-6 py-4 text-center">Aksi</th></tr>
                                    </thead>
                                    <tbody>
                                        ${AppState.products.map(p => `
                                            <tr class="border-b border-white/5 hover:bg-white/5">
                                                <td class="px-6 py-4 flex items-center gap-3"><span class="font-medium text-white">${p.name}</span></td>
                                                <td class="px-6 py-4">${p.category}</td>
                                                <td class="px-6 py-4 font-mono text-neon-blue">${formatRp(p.price)}</td>
                                                <td class="px-6 py-4 text-center">
                                                    <button onclick="deleteProductAction('${p.id}')" class="text-red-400 hover:text-red-300"><i class="fas fa-trash"></i></button>
                                                </td>
                                            </tr>`).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>`;

            window.addNewCategoryPrompt = () => {
                ModalSystem.show(`
                    <div class="glass-panel p-8 rounded-3xl w-11/12 max-w-sm border-neon-blue/20 shadow-neon-blue">
                        <h3 class="text-lg font-bold text-white mb-4">Tambah Kategori</h3>
                        <input type="text" id="new-cat-name" class="glow-input w-full bg-coffee-900 border border-white/10 rounded-xl px-4 py-2 mb-6 focus:outline-none">
                        <div class="flex gap-2">
                            <button onclick="ModalSystem.hide()" class="flex-1 py-2 rounded-lg border border-white/10 text-gray-400">Batal</button>
                            <button onclick="saveNewCategory()" class="flex-1 py-2 rounded-lg bg-neon-blue text-coffee-900 font-bold">Simpan</button>
                        </div>
                    </div>
                `);
            };

            window.saveNewCategory = async () => {
                const name = document.getElementById('new-cat-name').value.trim();
                if (!name) return;
                await syncToCloud('add_category', { name });
                ModalSystem.hide();
                renderAdminDashboard();
            };

            window.deleteCategoryAction = async (name) => {
                showCustomConfirm("Hapus Kategori?", `Apakah Anda yakin ingin menghapus kategori "${name}"?`, async () => {
                    await syncToCloud('delete_category', { name });
                    renderAdminDashboard();
                });
            };

            window.addNewProductModal = () => {
                ModalSystem.show(`
                    <div class="glass-panel p-8 rounded-3xl w-11/12 max-w-md border-neon-blue/20 shadow-neon-blue">
                        <h3 class="text-xl font-bold text-white mb-6">Tambah Menu Baru</h3>
                        <div class="space-y-4">
                            <div><label class="text-xs text-gray-400">Nama Menu</label><input type="text" id="new-prod-name" class="glow-input w-full bg-coffee-900 border border-white/10 rounded-xl px-3 py-2 text-white"></div>
                            <div><label class="text-xs text-gray-400">Harga</label><input type="number" id="new-prod-price" class="glow-input w-full bg-coffee-900 border border-white/10 rounded-xl px-3 py-2 text-white"></div>
                            <div><label class="text-xs text-gray-400">Kategori</label><select id="new-prod-cat" class="glow-input w-full bg-coffee-900 border border-white/10 rounded-xl px-3 py-2 text-white">${AppState.categories.map(c => `<option value="${c}">${c}</option>`).join('')}</select></div>
                        </div>
                        <div class="flex gap-2 mt-8">
                            <button onclick="ModalSystem.hide()" class="flex-1 py-2.5 rounded-xl border border-white/10 text-gray-400">Batal</button>
                            <button onclick="saveNewProduct()" class="flex-1 py-2.5 rounded-xl bg-neon-blue text-coffee-900 font-bold">Simpan</button>
                        </div>
                    </div>
                `);
            };

            window.saveNewProduct = async () => {
                const name = document.getElementById('new-prod-name').value.trim();
                const price = parseInt(document.getElementById('new-prod-price').value);
                const category = document.getElementById('new-prod-cat').value;
                if (!name || isNaN(price)) return;

                const payload = { 
                    id: 'P-' + Math.floor(Math.random() * 100000), 
                    name, 
                    price, 
                    category, 
                    status: 'ready', 
                    image: 'fa-cookie' 
                };

                await syncToCloud('add_product', payload);
                ModalSystem.hide();
                renderAdminDashboard();
            };

            window.deleteProductAction = async (id) => {
                showCustomConfirm("Hapus Produk?", "Apakah Anda yakin ingin menghapus menu hidangan ini?", async () => {
                    await syncToCloud('delete_product', { id });
                    renderAdminDashboard();
                });
            };
        }

        function renderAdminSettings(container) {
            const baseUrl = window.location.origin + window.location.pathname;
            const adminLink = baseUrl + "?view=admin";
            const customerLink = baseUrl;

            container.innerHTML = `
                <div class="max-w-2xl space-y-6 pb-20 animate-fade-in">
                    <div class="glass-panel p-6 rounded-2xl border border-neon-purple/30 shadow-neon-purple">
                        <h3 class="text-lg font-bold text-white mb-4"><i class="fas fa-qrcode text-neon-purple mr-2"></i>Link Akses & BYOD (Untuk Barcode/QR)</h3>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Link Akses Kasir (Admin)</label>
                                <div class="flex gap-2">
                                    <input type="text" readonly value="${adminLink}" class="w-full bg-black/50 border border-white/10 rounded-xl px-3 py-2 text-xs text-gray-300 font-mono">
                                    <button onclick="copyLinkToClipboard('${adminLink}')" class="px-3 py-2 bg-white/10 hover:bg-neon-purple hover:text-white text-neon-purple rounded-xl text-xs font-bold transition-colors"><i class="fas fa-copy"></i></button>
                                </div>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Link Pelanggan Umum (Pilih Meja Manual)</label>
                                <div class="flex gap-2">
                                    <input type="text" readonly value="${customerLink}" class="w-full bg-black/50 border border-white/10 rounded-xl px-3 py-2 text-xs text-gray-300 font-mono">
                                    <button onclick="copyLinkToClipboard('${customerLink}')" class="px-3 py-2 bg-white/10 hover:bg-neon-blue hover:text-white text-neon-blue rounded-xl text-xs font-bold transition-colors"><i class="fas fa-copy"></i></button>
                                </div>
                            </div>
                            <div class="pt-3 border-t border-white/10 mt-2">
                                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Generator Link Meja Khusus (Stiker QR Meja Fisik)</label>
                                <div class="flex gap-2">
                                    <select id="qr-table-selector" onchange="updateTableLink()" class="bg-coffee-900 border border-white/10 rounded-xl px-3 py-2 text-xs text-white focus:outline-none">
                                        ${Array.from({length: AppState.settings.numTables || 6}, (_, i) => `<option value="M-${i+1}">M-${i+1}</option>`).join('')}
                                    </select>
                                    <input type="text" id="qr-table-link" readonly value="${baseUrl}?table=M-1" class="w-full bg-black/50 border border-white/10 rounded-xl px-3 py-2 text-xs text-neon-blue font-mono">
                                    <button onclick="copyTableLink()" class="px-3 py-2 bg-neon-blue text-coffee-900 rounded-xl text-xs font-bold hover:shadow-neon-blue transition-all"><i class="fas fa-copy"></i></button>
                                </div>
                                <p class="text-[10px] text-gray-500 mt-2">Salin link meja spesifik di atas, lalu tempel pada web pembuat QR Code gratis untuk dicetak menjadi stiker meja.</p>
                            </div>
                        </div>
                    </div>

                    <div class="glass-panel p-6 rounded-2xl border border-neon-blue/30 shadow-neon-blue/20">
                        <h3 class="text-lg font-bold text-white mb-2">Manajemen Banner Promo (Sisi HP)</h3>
                        <div class="space-y-2 mb-4 animate-fade-in" id="promos-admin-list">
                            ${(AppState.settings.promos || []).map((url, i) => `
                                <div class="flex items-center justify-between bg-black/40 rounded-xl p-2.5 text-xs">
                                    <span class="truncate pr-4 font-mono text-gray-400">${url}</span>
                                    <button onclick="removePromoLink(${i})" class="text-red-400 hover:text-red-300"><i class="fas fa-trash-can"></i></button>
                                </div>`).join('')}
                        </div>
                        <div class="flex gap-2">
                            <input type="text" id="new-promo-url" placeholder="Masukan link gambar (https://...)" class="glow-input flex-1 bg-coffee-900 border border-white/10 rounded-xl px-3 py-2 text-xs text-white focus:outline-none">
                            <button onclick="addNewPromoLink()" class="px-4 py-2 bg-neon-blue text-coffee-900 rounded-xl text-xs font-bold hover:shadow-neon-blue">Tambah</button>
                        </div>
                    </div>

                    <div class="glass-panel p-6 rounded-2xl border border-white/5">
                        <h3 class="text-lg font-bold text-white mb-4">Pengaturan Web App</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div><label class="block text-sm text-gray-400 mb-1">Nama Toko</label><input type="text" id="setting-store-name" value="${AppState.settings.storeName}" class="glow-input w-full bg-coffee-900 border border-white/10 rounded-xl px-4 py-2 text-white"></div>
                            <div><label class="block text-sm text-gray-400 mb-1">Jumlah Meja</label><input type="number" id="setting-tables" value="${AppState.settings.numTables}" class="glow-input w-full bg-coffee-900 border border-white/10 rounded-xl px-4 py-2 text-white"></div>
                            <div><label class="block text-sm text-gray-400 mb-1">Discord Webhook Dapur</label><input type="text" id="setting-webhook-kitchen" value="${AppState.settings.webhookKitchen || ''}" class="glow-input w-full bg-coffee-900 border border-white/10 rounded-xl px-4 py-2 text-white"></div>
                            <div><label class="block text-sm text-gray-400 mb-1">Discord Webhook Kasir</label><input type="text" id="setting-webhook-cashier" value="${AppState.settings.webhookCashier || ''}" class="glow-input w-full bg-coffee-900 border border-white/10 rounded-xl px-4 py-2 text-white"></div>
                        </div>
                    </div>

                    <div class="flex justify-end gap-2">
                        <button onclick="BackupManager.exportJSON()" class="bg-coffee-800 hover:bg-coffee-700 text-white px-4 py-2 rounded-xl text-sm font-bold border border-white/5">Ekspor Database (.JSON)</button>
                        <button onclick="saveSettings()" class="bg-neon-blue text-coffee-900 px-6 py-2 rounded-xl text-sm font-black shadow-neon-blue hover:shadow-neon-blue-hover transition-all">Simpan Konfigurasi</button>
                    </div>
                </div>`;

            window.addNewPromoLink = () => {
                const url = document.getElementById('new-promo-url').value.trim();
                if (!url) return;
                if (!AppState.settings.promos) AppState.settings.promos = [];
                AppState.settings.promos.push(url);
                syncToCloud('save_settings', AppState.settings).then(() => renderAdminDashboard());
            };

            window.removePromoLink = (index) => {
                AppState.settings.promos.splice(index, 1);
                syncToCloud('save_settings', AppState.settings).then(() => renderAdminDashboard());
            };

            window.saveSettings = async () => {
                AppState.settings.storeName = document.getElementById('setting-store-name').value || 'Cyber Brew';
                AppState.settings.numTables = parseInt(document.getElementById('setting-tables').value);
                AppState.settings.webhookKitchen = document.getElementById('setting-webhook-kitchen').value;
                AppState.settings.webhookCashier = document.getElementById('setting-webhook-cashier').value;
                
                await syncToCloud('save_settings', AppState.settings);
                showCustomToast('Seluruh konfigurasi berhasil disimpan!');
                setTimeout(() => renderAdminDashboard(), 1000);
            };

            window.copyLinkToClipboard = (text) => {
                const tempInput = document.createElement("input");
                tempInput.value = text;
                document.body.appendChild(tempInput);
                tempInput.select();
                document.execCommand("copy"); // Fallback iFrame
                document.body.removeChild(tempInput);
                showCustomToast("Link berhasil disalin ke clipboard!");
            };

            window.updateTableLink = () => {
                const base = window.location.origin + window.location.pathname;
                const sel = document.getElementById('qr-table-selector').value;
                document.getElementById('qr-table-link').value = base + "?table=" + sel;
            };

            window.copyTableLink = () => {
                window.copyLinkToClipboard(document.getElementById('qr-table-link').value);
            };
        }

        /**
         * ==========================================
         * 11. ENTRY POINT WINDOW ONLOAD
         * ==========================================
         */
        window.onload = async () => {
            // Service Worker Offline Handler
            if ('serviceWorker' in navigator) {
                if (window.location.protocol === 'http:' || window.location.protocol === 'https:') {
                    try {
                        await navigator.serviceWorker.register('sw.js');
                        console.log('Service Worker PWA Terdaftar.');
                    } catch (e) {
                        console.error('Service Worker Gagal:', e);
                    }
                }
            }

            // Jalankan Verifikasi Router
            initRouter();
        };

    </script>
</body>
</html>
