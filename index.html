
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POS Kasir Mandiri</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#120E0B">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        coffee: {
                            900: '#120E0B', 
                            850: '#171310', 
                            800: '#1E1814', 
                            700: '#2A231E', 
                        },
                        neon: {
                            blue: '#00f0ff',   
                            purple: '#bc13fe', 
                            green: '#39ff14'   
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    boxShadow: {
                        'neon-blue': '0 0 15px rgba(0, 240, 255, 0.4)',
                        'neon-blue-hover': '0 0 25px rgba(0, 240, 255, 0.7)',
                        'neon-purple': '0 0 15px rgba(188, 19, 254, 0.4)',
                        'neon-purple-hover': '0 0 25px rgba(188, 19, 254, 0.7)',
                    }
                }
            }
        }
    </script>

    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 240, 255, 0.3); border-radius: 10px; }
        
        .glass-panel {
            background: rgba(30, 24, 20, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 240, 255, 0.15);
        }

        .glass-button {
            background: rgba(0, 240, 255, 0.08);
            border: 1px solid rgba(0, 240, 255, 0.3);
            transition: all 0.3s ease;
        }

        .glass-button:hover:not(:disabled) {
            background: rgba(0, 240, 255, 0.2);
            border-color: rgba(0, 240, 255, 0.8);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.5);
        }

        .glow-input:focus {
            border-color: #00f0ff;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-coffee-900 text-gray-200 h-screen w-screen overflow-hidden antialiased">

    <!-- Kontainer Aplikasi Kasir -->
    <div id="app" class="h-full w-full relative"></div>
    <div id="modal-container" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/80 backdrop-blur-sm"></div>

    <script>
        /**
         * =======================================================================
         * 1. PARAMETER API & KREDENSIAL KASIR
         * =======================================================================
         */
        const APP_ID = "SMARTPOS_UKM_01";
        const API_BASE_URL = "https://kasirmandiri.ku-ghost.workers.dev/api/gate";

        function showCustomToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-10 left-1/2 -translate-x-1/2 z-50 glass-panel px-6 py-3 rounded-xl border flex items-center gap-3 animate-fade-in shadow-neon-blue ${
                type === 'error' ? 'border-red-500/50 text-red-400 bg-red-950/90' : 'border-neon-blue/50 text-neon-blue bg-[#1e1814]/90'
            }`;
            toast.innerHTML = `<i class="fas ${type === 'error' ? 'fa-triangle-exclamation' : 'fa-check-circle'}"></i> <span class="font-bold text-sm">${message}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('opacity-0', 'transition-opacity', 'duration-300');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function showCustomConfirm(title, message, onConfirm) {
            ModalSystem.show(`
                <div class="glass-panel p-8 rounded-3xl w-11/12 max-w-sm text-center border-neon-blue/20 shadow-neon-blue">
                    <i class="fas fa-circle-question text-4xl text-neon-blue mb-4"></i>
                    <h3 class="text-xl font-bold text-white mb-2">${title}</h3>
                    <p class="text-gray-400 text-sm mb-6">${message}</p>
                    <div class="flex gap-3">
                        <button onclick="ModalSystem.hide()" class="flex-1 py-2.5 rounded-xl border border-white/10 text-gray-400">Batal</button>
                        <button id="confirm-btn" class="flex-1 py-2.5 rounded-xl bg-neon-blue text-coffee-900 font-black">Konfirmasi</button>
                    </div>
                </div>
            `);
            document.getElementById('confirm-btn').onclick = () => { ModalSystem.hide(); onConfirm(); };
        }

        const DatabaseManager = {
            dbKey: APP_ID + '_local_db',
            init: function() {
                let localData = localStorage.getItem(this.dbKey);
                return localData ? JSON.parse(localData) : {};
            }
        };

        const localDB = DatabaseManager.init();
        const AppState = {
            settings: localDB.settings || { adminPin: '1234', storeName: 'Cyber POS', numTables: 12, storeStatus: 'open' },
            categories: localDB.categories || ['Minuman', 'Makanan'],
            products: localDB.products || [],
            activeOrders: [],
            orderHistory: [],
            tablesStatus: {},
            currentTab: 'dashboard'
        };

        const formatRp = (num) => 'Rp ' + num.toLocaleString('id-ID');

        async function syncToCloud(action, payload = {}) {
            const token = localStorage.getItem(APP_ID + '_kasir_password') || "PREVIEW_TOKEN";
            try {
                const response = await fetch(API_BASE_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        app_id: APP_ID,
                        store_reg_name: 'kasirmandiri_ukm',
                        auth_token: token,
                        action: action,
                        payload: payload
                    })
                });
                return await response.json();
            } catch (err) {
                return { error: err.message };
            }
        }

        const ModalSystem = {
            show: (html) => { const c = document.getElementById('modal-container'); c.innerHTML = html; c.classList.remove('hidden'); },
            hide: () => { document.getElementById('modal-container').classList.add('hidden'); }
        };

        /**
         * ==========================================
         * 2. ROUTING & LOGIN GATE
         * ==========================================
         */
        function renderLogin() {
            document.getElementById('app').innerHTML = `
                <div class="h-full flex items-center justify-center p-6 bg-coffee-900">
                    <div class="glass-panel p-8 rounded-3xl max-w-sm w-full text-center border-neon-blue/20 shadow-neon-blue animate-fade-in">
                        <i class="fas fa-cash-register text-5xl text-neon-blue mb-4"></i>
                        <h2 class="text-2xl font-black text-white mb-2 uppercase">KASIR LOGIN</h2>
                        <p class="text-gray-400 text-xs mb-6">Silakan masukkan PIN Otorisasi Staf</p>
                        <input type="password" id="login-pin" placeholder="••••" class="glow-input w-full bg-coffee-900 border border-white/15 rounded-xl px-4 py-3 text-center text-neon-blue tracking-widest text-2xl mb-4 font-mono">
                        <button onclick="verifyLogin()" class="w-full py-3.5 rounded-xl bg-neon-blue text-coffee-900 font-bold hover:shadow-neon-blue-hover transition-colors">Verifikasi</button>
                    </div>
                </div>`;
        }

        async function verifyLogin() {
            const pin = document.getElementById('login-pin').value;
            if (pin === AppState.settings.adminPin) {
                localStorage.setItem(APP_ID + '_kasir_password', pin);
                showCustomToast("Login Berhasil!");
                renderDashboard();
            } else {
                showCustomToast("PIN Kasir Salah!", "error");
            }
        }

        /**
         * ==========================================
         * 3. DASHBOARD KASIR UTAMA
         * ==========================================
         */
        async function renderDashboard() {
            // Muat data langsung dari cloud D1
            const res = await syncToCloud('get_initial_data');
            if (res && !res.error) {
                AppState.products = res.products || [];
                AppState.categories = res.categories || [];
                AppState.settings = res.settings || AppState.settings;
                AppState.activeOrders = res.activeOrders || [];
                AppState.orderHistory = res.orderHistory || [];
                AppState.tablesStatus = res.tablesStatus || {};
            }

            document.getElementById('app').innerHTML = `
                <div class="flex flex-col h-full bg-coffee-900 relative overflow-hidden w-full">
                    <header class="glass-panel border-b border-white/5 px-6 py-4 flex flex-wrap justify-between items-center z-20 gap-4">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-neon-blue to-neon-purple flex items-center justify-center shadow-neon-blue">
                                <i class="fas fa-desktop text-coffee-900"></i>
                            </div>
                            <div>
                                <h1 class="text-lg font-black text-white uppercase">${AppState.settings.storeName}</h1>
                                <p class="text-[9px] text-gray-400 uppercase font-mono tracking-widest">Dashboard Kasir Aktif</p>
                            </div>
                        </div>

                        <nav class="flex items-center gap-1.5 bg-black/40 p-1.5 rounded-2xl border border-white/5">
                            <button onclick="switchTab('dashboard')" id="tab-dashboard" class="px-4 py-2 rounded-xl text-xs font-semibold">Sesi & Antrian</button>
                            <button onclick="switchTab('products')" id="tab-products" class="px-4 py-2 rounded-xl text-xs font-semibold">Daftar Menu</button>
                            <button onclick="switchTab('settings')" id="tab-settings" class="px-4 py-2 rounded-xl text-xs font-semibold">Pengaturan</button>
                        </nav>

                        <button onclick="logout()" class="px-4 py-2 rounded-xl bg-red-500/10 hover:bg-red-500 text-red-400 hover:text-white border border-red-500/20 text-xs font-bold">Logout</button>
                    </header>

                    <div class="flex-1 p-6 md:p-8 overflow-y-auto z-10" id="dashboard-body"></div>
                </div>`;

            switchTab(AppState.currentTab);
        }

        function switchTab(tab) {
            AppState.currentTab = tab;
            const act = 'bg-neon-blue/15 text-neon-blue border border-neon-blue/20 font-bold';
            const inact = 'text-gray-400 hover:bg-white/5 border border-transparent';
            
            ['dashboard','products','settings'].forEach(t => {
                const btn = document.getElementById('tab-' + t);
                if (btn) btn.className = `px-4 py-2 rounded-xl text-xs transition-all ${tab === t ? act : inact}`;
            });

            const body = document.getElementById('dashboard-body');
            if (tab === 'dashboard') renderMainSesi(body);
            else if (tab === 'products') renderMenuSesi(body);
            else renderSettingsSesi(body);
        }

        function renderMainSesi(container) {
            const activeOrders = AppState.activeOrders || [];
            const tablesStatus = AppState.tablesStatus || {};

            container.innerHTML = `
                <!-- BAGIAN 1: STATUS REAL-TIME MEJA HP PELANGGAN -->
                <div class="glass-panel rounded-2xl overflow-hidden border border-white/5 mb-8 animate-fade-in">
                    <div class="p-4 border-b border-white/5 bg-black/20 flex justify-between items-center">
                        <h3 class="font-bold text-white"><i class="fas fa-tablet-screen-button text-neon-blue mr-2"></i>Status Layar Sesi Pelanggan</h3>
                        <button onclick="renderDashboard()" class="text-xs bg-neon-blue/10 border border-neon-blue/30 text-neon-blue px-3 py-1.5 rounded-xl"><i class="fas fa-arrows-rotate mr-1"></i> Refresh</button>
                    </div>
                    <div class="p-5 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
                        
                        <!-- Panel Take Away -->
                        ${(() => {
                            const ta = tablesStatus['TAKE-AWAY'] || { status: 'vacant' };
                            let color = "border-neon-green/30 bg-neon-green/5"; let text = "Kosong / Ready"; let textC = "text-neon-green";
                            if (ta.status === 'locked') { color = "border-yellow-500/30 bg-yellow-500/5"; text = "Menunggu Bayar"; textC = "text-yellow-500"; }
                            else if (ta.status === 'done') { color = "border-neon-purple/40 bg-neon-purple/5"; text = "Nota Aktif"; textC = "text-neon-purple"; }
                            return `
                                <div class="border ${color} rounded-2xl p-4 flex flex-col justify-between items-center text-center">
                                    <div><span class="text-[9px] font-bold text-gray-400">TAKE AWAY</span><p class="text-xl font-black ${textC}">🥡 Bawa Pulang</p></div>
                                    <div class="mt-4 w-full">
                                        <span class="block text-[9px] ${textC} font-black uppercase mb-2.5">${text}</span>
                                        ${ta.status !== 'vacant' ? `<button onclick="resetMeja('TAKE-AWAY')" class="w-full py-1.5 bg-neon-purple/15 text-neon-purple border border-neon-purple/30 hover:bg-neon-purple hover:text-coffee-900 text-[10px] font-black rounded-xl transition-all">DEPAK/KOSONGKAN</button>` : `<div class="w-full py-1.5 text-gray-600 border border-white/5 rounded-xl text-[10px]">Standby</div>`}
                                    </div>
                                </div>`;
                        })()}

                        <!-- Meja Fisik -->
                        ${Array.from({length: AppState.settings.numTables || 6}, (_, i) => {
                            const tId = `M-${i+1}`;
                            const ts = tablesStatus[tId] || { status: 'vacant' };
                            let color = "border-neon-green/30 bg-neon-green/5"; let text = "Kosong / Ready"; let textC = "text-neon-green";
                            if (ts.status === 'ordering') { color = "border-blue-500/30 bg-blue-500/5"; text = "Sedang Memilih"; textC = "text-neon-blue"; }
                            else if (ts.status === 'locked') { color = "border-yellow-500/30 bg-yellow-500/5"; text = "Menunggu Bayar"; textC = "text-yellow-500"; }
                            else if (ts.status === 'done') { color = "border-neon-purple/40 bg-neon-purple/5"; text = "Nota Aktif"; textC = "text-neon-purple"; }

                            return `
                                <div class="border ${color} rounded-2xl p-4 flex flex-col justify-between items-center text-center">
                                    <div><span class="text-[9px] font-bold text-gray-400">MEJA</span><p class="text-2xl font-black ${textC}">${tId}</p></div>
                                    <div class="mt-4 w-full">
                                        <span class="block text-[9px] ${textC} font-black uppercase mb-2.5">${text}</span>
                                        ${ts.status !== 'vacant' ? `<button onclick="resetMeja('${tId}')" class="w-full py-1.5 bg-neon-purple/15 text-neon-purple border border-neon-purple/30 hover:bg-neon-purple hover:text-coffee-900 text-[10px] font-black rounded-xl transition-all">DEPAK/RESET</button>` : `<div class="w-full py-1.5 text-gray-600 border border-white/5 rounded-xl text-[10px]">Standby</div>`}
                                    </div>
                                </div>`;
                        }).join('')}
                    </div>
                </div>

                <!-- BAGIAN 2: ANTRIAN STRIP PEMBAYARAN KASIR -->
                <div class="glass-panel rounded-2xl overflow-hidden border border-white/5 animate-fade-in">
                    <div class="p-4 border-b border-white/5 bg-black/20"><h3 class="font-bold text-white"><i class="fas fa-cash-register text-neon-blue mr-2"></i>Antrian Tagihan Pelanggan</h3></div>
                    ${activeOrders.length === 0 ? `<div class="p-12 text-center text-gray-500">Tidak ada antrian pesanan aktif.</div>` : `
                        <div class="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            ${activeOrders.map(o => `
                                <div class="bg-coffee-800 border border-white/5 rounded-2xl p-5 relative flex flex-col justify-between">
                                    <div class="absolute top-0 right-0 bg-neon-blue text-coffee-900 px-3 py-1 text-xs font-black rounded-bl-xl uppercase">${o.table_id}</div>
                                    <div class="mb-4">
                                        <span class="text-[10px] text-gray-400 font-mono">${o.order_id}</span>
                                        <h4 class="text-base font-black text-white mt-1">👤 ${o.customer_name}</h4>
                                        <h3 class="text-lg font-bold text-neon-blue mb-3">${formatRp(o.total_amount)}</h3>
                                        <div class="space-y-1.5 border-t border-white/5 pt-2 max-h-32 overflow-y-auto pr-1">
                                            ${o.items.map(it => `<div class="flex justify-between text-xs text-gray-300"><span>${it.qty}x ${it.name}</span></div>`).join('')}
                                        </div>
                                    </div>
                                    <button onclick="selesaikanPesanan('${o.order_id}', '${o.table_id}')" class="w-full py-3 bg-neon-green/10 hover:bg-neon-green hover:text-coffee-900 text-neon-green font-bold text-xs rounded-xl border border-neon-green/30 transition-colors uppercase">SELESAI / TRANSAKSI LUNAS</button>
                                </div>
                            `).join('')}
                        </div>`}
                </div>`;

            window.resetMeja = (tableId) => {
                showCustomConfirm("Depak Layar Pelanggan?", `Apakah Anda yakin ingin mengosongkan sesi meja ${tableId}?`, async () => {
                    const res = await syncToCloud('reset_table', { table_id: tableId });
                    if(res && !res.error) { showCustomToast("Sesi meja berhasil didepak."); renderDashboard(); }
                });
            };

            window.selesaikanPesanan = (orderId, tableId) => {
                showCustomConfirm("Konfirmasi Pembayaran Lunas?", "Layar HP pelanggan akan otomatis diarahkan ke Nota Digital Lunas secara real-time.", async () => {
                    const res = await syncToCloud('update_order_status', { order_id: orderId, status: 'completed', table_id: tableId });
                    if (res && !res.error) { showCustomToast("Transaksi Selesai & Lunas!"); renderDashboard(); }
                });
            };
        }

        function renderMenuSesi(container) {
            container.innerHTML = `
                <div class="flex flex-col lg:flex-row gap-8 animate-fade-in">
                    <!-- Kategori -->
                    <div class="w-full lg:w-1/3">
                        <div class="glass-panel p-6 rounded-2xl border border-white/5">
                            <h3 class="text-lg font-bold text-white mb-4 flex justify-between items-center">
                                <span>Kategori Menu</span>
                                <button onclick="tambahKategoriPrompt()" class="px-2.5 py-1 bg-neon-blue text-coffee-900 text-xs font-black rounded-lg"><i class="fas fa-plus"></i></button>
                            </h3>
                            <div class="space-y-2 max-h-80 overflow-y-auto pr-1">
                                ${AppState.categories.map(cat => `
                                    <div class="flex justify-between items-center bg-black/40 rounded-xl px-4 py-2.5 border border-white/5">
                                        <span class="text-sm font-medium text-gray-200">${cat}</span>
                                        <button onclick="hapusKategori('${cat}')" class="text-red-400 hover:text-red-300 text-xs"><i class="fas fa-trash-can"></i></button>
                                    </div>`).join('')}
                            </div>
                        </div>
                    </div>

                    <!-- Produk -->
                    <div class="w-full lg:w-2/3">
                        <div class="glass-panel p-6 rounded-2xl border border-white/5">
                            <div class="flex justify-between items-center mb-6">
                                <h3 class="text-lg font-bold text-white">Daftar Hidangan</h3>
                                <button onclick="tambahProdukModal()" class="px-4 py-2 bg-gradient-to-r from-neon-blue to-neon-purple text-coffee-900 text-xs font-black rounded-xl">TAMBAH HIDANGAN</button>
                            </div>
                            <div class="overflow-x-auto">
                                <table class="w-full text-left text-sm text-gray-300">
                                    <thead class="bg-black/40 text-xs uppercase border-b border-white/5">
                                        <tr><th class="px-6 py-4">Menu</th><th class="px-6 py-4">Kategori</th><th class="px-6 py-4">Harga</th><th class="px-6 py-4">Status</th><th class="px-6 py-4 text-center">Hapus</th></tr>
                                    </thead>
                                    <tbody>
                                        ${AppState.products.map(p => `
                                            <tr class="border-b border-white/5 hover:bg-white/5">
                                                <td class="px-6 py-4 font-bold text-white">${p.name}</td>
                                                <td class="px-6 py-4">${p.category}</td>
                                                <td class="px-6 py-4 font-mono text-neon-blue">${formatRp(p.price)}</td>
                                                <td class="px-6 py-4">
                                                    <button onclick="toggleProductStatus('${p.id}', '${p.status}')" class="px-2.5 py-1 text-[10px] font-black rounded ${p.status === 'habis' ? 'bg-red-500/10 border border-red-500/30 text-red-400' : 'bg-neon-green/10 border border-neon-green/30 text-neon-green'} uppercase">
                                                        ${p.status === 'habis' ? 'Habis' : 'Ready'}
                                                    </button>
                                                </td>
                                                <td class="px-6 py-4 text-center">
                                                    <button onclick="hapusProduk('${p.id}')" class="text-red-400 hover:text-red-300"><i class="fas fa-trash"></i></button>
                                                </td>
                                            </tr>`).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>`;

            window.tambahKategoriPrompt = () => {
                ModalSystem.show(`
                    <div class="glass-panel p-6 rounded-2xl w-11/12 max-w-sm">
                        <h3 class="text-lg font-bold text-white mb-4">Tambah Kategori Baru</h3>
                        <input type="text" id="new-cat" class="glow-input w-full bg-coffee-900 border border-white/10 rounded-xl px-4 py-2.5 mb-6 text-white focus:outline-none">
                        <div class="flex gap-2">
                            <button onclick="ModalSystem.hide()" class="flex-1 py-2 rounded-xl border border-white/10 text-gray-400">Batal</button>
                            <button onclick="simpanKategori()" class="flex-1 py-2 rounded-xl bg-neon-blue text-coffee-900 font-bold">Simpan</button>
                        </div>
                    </div>`);
            };

            window.simpanKategori = async () => {
                const name = document.getElementById('new-cat').value.trim();
                if (!name) return;
                await syncToCloud('add_category', { name });
                ModalSystem.hide();
                renderDashboard();
            };

            window.hapusKategori = async (name) => {
                showCustomConfirm("Hapus Kategori?", `Hapus kategori "${name}"?`, async () => {
                    await syncToCloud('delete_category', { name });
                    renderDashboard();
                });
            };

            window.tambahProdukModal = () => {
                ModalSystem.show(`
                    <div class="glass-panel p-8 rounded-3xl w-11/12 max-w-md">
                        <h3 class="text-xl font-bold text-white mb-6">Tambah Hidangan</h3>
                        <div class="space-y-4">
                            <div><label class="text-xs text-gray-400">Nama Menu</label><input type="text" id="p-name" class="glow-input w-full bg-coffee-900 border border-white/10 rounded-xl px-3 py-2 text-white"></div>
                            <div><label class="text-xs text-gray-400">Harga</label><input type="number" id="p-price" class="glow-input w-full bg-coffee-900 border border-white/10 rounded-xl px-3 py-2 text-white"></div>
                            <div><label class="text-xs text-gray-400">Kategori</label><select id="p-cat" class="glow-input w-full bg-coffee-900 border border-white/10 rounded-xl px-3 py-2 text-white">${AppState.categories.map(c => `<option value="${c}">${c}</option>`).join('')}</select></div>
                        </div>
                        <div class="flex gap-2 mt-8">
                            <button onclick="ModalSystem.hide()" class="flex-1 py-2.5 rounded-xl border border-white/10 text-gray-400">Batal</button>
                            <button onclick="simpanProduk()" class="flex-1 py-2.5 rounded-xl bg-neon-blue text-coffee-900 font-bold">Simpan</button>
                        </div>
                    </div>`);
            };

            window.simpanProduk = async () => {
                const name = document.getElementById('p-name').value.trim();
                const price = parseInt(document.getElementById('p-price').value);
                const category = document.getElementById('p-cat').value;
                if (!name || isNaN(price)) return;

                const payload = { id: 'P-' + Math.floor(Math.random() * 100000), name, price, category, status: 'ready', image: 'fa-cookie' };
                await syncToCloud('add_product', payload);
                ModalSystem.hide();
                renderDashboard();
            };

            window.toggleProductStatus = async (id, currentStatus) => {
                const nextStatus = currentStatus === 'ready' ? 'habis' : 'ready';
                await syncToCloud('update_product_status', { id, status: nextStatus });
                renderDashboard();
            };

            window.hapusProduk = async (id) => {
                showCustomConfirm("Hapus Produk Ini?", "Tindakan tidak dapat dibatalkan.", async () => {
                    await syncToCloud('delete_product', { id });
                    renderDashboard();
                });
            };
        }

        function renderSettingsSesi(container) {
            const base = window.location.origin + window.location.pathname.replace('cashier.html', 'index.html');
            container.innerHTML = `
                <div class="max-w-2xl space-y-6 animate-fade-in">
                    <!-- Generator QR Code Link -->
                    <div class="glass-panel p-6 rounded-2xl border border-neon-purple/30 shadow-neon-purple">
                        <h3 class="text-lg font-bold text-white mb-4"><i class="fas fa-qrcode text-neon-purple mr-2"></i>Sistem QR Code Meja Pelanggan</h3>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Pilih Meja untuk Link Stiker QR</label>
                                <div class="flex gap-2">
                                    <select id="qr-sel" onchange="updateQRLink()" class="bg-coffee-900 border border-white/10 rounded-xl px-3 py-2 text-xs text-white focus:outline-none">
                                        ${Array.from({length: AppState.settings.numTables || 6}, (_, i) => `<option value="M-${i+1}">M-${i+1}</option>`).join('')}
                                    </select>
                                    <input type="text" id="qr-link" readonly value="${base}?table=M-1" class="w-full bg-black/50 border border-white/10 rounded-xl px-3 py-2 text-xs text-neon-blue font-mono">
                                    <button onclick="copyQRLink()" class="px-4 py-2 bg-neon-blue text-coffee-900 rounded-xl text-xs font-bold"><i class="fas fa-copy"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Banner Promo Slider -->
                    <div class="glass-panel p-6 rounded-2xl border border-white/5">
                        <h3 class="text-lg font-bold text-white mb-4">Banner Promo Sisi HP Pelanggan</h3>
                        <div class="space-y-2 mb-4" id="promos-list">
                            ${(AppState.settings.promos || []).map((url, i) => `
                                <div class="flex items-center justify-between bg-black/40 rounded-xl p-2.5 text-xs">
                                    <span class="truncate pr-4 font-mono text-gray-400">${url}</span>
                                    <button onclick="removePromo(${i})" class="text-red-400 hover:text-red-300"><i class="fas fa-trash-can"></i></button>
                                </div>`).join('')}
                        </div>
                        <div class="flex gap-2">
                            <input type="text" id="p-url" placeholder="https://..." class="glow-input flex-1 bg-coffee-900 border border-white/10 rounded-xl px-3 py-2 text-xs text-white">
                            <button onclick="addPromo()" class="px-4 py-2 bg-neon-blue text-coffee-900 rounded-xl text-xs font-bold">Tambah</button>
                        </div>
                    </div>

                    <!-- Konfigurasi Global -->
                    <div class="glass-panel p-6 rounded-2xl border border-white/5">
                        <h3 class="text-lg font-bold text-white mb-4">Pengaturan Toko</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div><label class="block text-sm text-gray-400 mb-1">Nama Toko</label><input type="text" id="set-name" value="${AppState.settings.storeName}" class="glow-input w-full bg-coffee-900 border border-white/10 rounded-xl px-4 py-2 text-white"></div>
                            <div><label class="block text-sm text-gray-400 mb-1">Jumlah Meja</label><input type="number" id="set-tables" value="${AppState.settings.numTables}" class="glow-input w-full bg-coffee-900 border border-white/10 rounded-xl px-4 py-2 text-white"></div>
                        </div>
                        <button onclick="saveGlobalSettings()" class="mt-6 px-6 py-2.5 bg-neon-blue text-coffee-900 font-black text-xs rounded-xl hover:shadow-neon-blue transition-all">SIMPAN PERUBAHAN</button>
                    </div>
                </div>`;

            window.updateQRLink = () => {
                const sel = document.getElementById('qr-sel').value;
                document.getElementById('qr-link').value = base + "?table=" + sel;
            };

            window.copyQRLink = () => {
                const link = document.getElementById('qr-link').value;
                const temp = document.createElement("input");
                temp.value = link; document.body.appendChild(temp); temp.select();
                document.execCommand("copy"); document.body.removeChild(temp);
                showCustomToast("Link stiker QR berhasil disalin!");
            };

            window.addPromo = async () => {
                const url = document.getElementById('p-url').value.trim();
                if (!url) return;
                if (!AppState.settings.promos) AppState.settings.promos = [];
                AppState.settings.promos.push(url);
                await syncToCloud('save_settings', AppState.settings);
                renderDashboard();
            };

            window.removePromo = async (index) => {
                AppState.settings.promos.splice(index, 1);
                await syncToCloud('save_settings', AppState.settings);
                renderDashboard();
            };

            window.saveGlobalSettings = async () => {
                AppState.settings.storeName = document.getElementById('set-name').value;
                AppState.settings.numTables = parseInt(document.getElementById('set-tables').value);
                await syncToCloud('save_settings', AppState.settings);
                showCustomToast("Pengaturan berhasil disimpan.");
                renderDashboard();
            };
        }

        function logout() {
            localStorage.removeItem(APP_ID + '_kasir_password');
            renderLogin();
        }

        window.onload = () => {
            const savedPin = localStorage.getItem(APP_ID + '_kasir_password');
            if (savedPin === AppState.settings.adminPin) renderDashboard();
            else renderLogin();
        };
    </script>
</body>
</html>
