<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Kiosk & POS Mandiri</title>
    
    <meta name="theme-color" content="#120E0B">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        coffee: {
                            900: '#120E0B', 
                            850: '#171310', 
                            800: '#1E1814', 
                            700: '#2A231E', 
                        },
                        neon: {
                            blue: '#00f0ff',   
                            purple: '#bc13fe', 
                            green: '#39ff14'   
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    boxShadow: {
                        'neon-blue': '0 0 15px rgba(0, 240, 255, 0.4)',
                        'neon-blue-hover': '0 0 25px rgba(0, 240, 255, 0.7)',
                        'neon-purple': '0 0 15px rgba(188, 19, 254, 0.4)',
                        'neon-purple-hover': '0 0 25px rgba(188, 19, 254, 0.7)',
                    }
                }
            }
        }
    </script>

    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 240, 255, 0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0, 240, 255, 0.6); }

        .glass-panel {
            background: rgba(30, 24, 20, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 240, 255, 0.15);
        }

        .glass-button {
            background: rgba(0, 240, 255, 0.08);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(0, 240, 255, 0.3);
            transition: all 0.3s ease;
        }
        
        .glass-button:hover:not(:disabled) {
            background: rgba(0, 240, 255, 0.2);
            border-color: rgba(0, 240, 255, 0.8);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.5);
        }

        .glow-input:focus {
            border-color: #00f0ff;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        .animate-float { animation: float 3s ease-in-out infinite; }

        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        body { user-select: none; }
    </style>
</head>
<body class="bg-coffee-900 text-gray-200 h-screen w-screen overflow-hidden antialiased">

    <div id="app" class="h-full w-full relative"></div>
    
    <div id="modal-container" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/80 backdrop-blur-sm animate-fade-in"></div>

    <script>
        /**
         * ==========================================
         * 1. VARIABEL IDENTITAS SCRIPT & KONSTANTA
         * ==========================================
         */
        const APP_ID = "SMARTPOS_UKM_01";
        const SALT_KEY = "kugoskom"; 

        // CONFIG KUNCI GERBANG LISENSI (PREVIEW MODE)
        const BYPASS_LICENSE_FOR_PREVIEW = true; 

        // TARGET ENDPOINT CLOUDFLARE WORKERS UTAMA
        const API_BASE_URL = "https://kasirmandiri.ku-ghost.workers.dev/api/gate";

        /**
         * ==========================================
         * SYSTEM TOAST & MODAL SYSTEM (Anti Sandbox Block)
         * ==========================================
         */
        function showCustomToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-24 left-1/2 -translate-x-1/2 z-50 glass-panel px-6 py-3 rounded-xl border flex items-center gap-3 animate-fade-in shadow-neon-blue ${
                type === 'error' ? 'border-red-500/50 text-red-400 bg-red-950/90' : 'border-neon-blue/50 text-neon-blue bg-[#1e1814]/90'
            }`;
            toast.innerHTML = `<i class="fas ${type === 'error' ? 'fa-triangle-exclamation' : 'fa-check-circle'}"></i> <span class="font-bold text-sm tracking-wide">${message}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('opacity-0', 'transition-opacity', 'duration-300');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function showCustomConfirm(title, message, onConfirm) {
            ModalSystem.show(`
                <div class="glass-panel p-8 rounded-3xl w-11/12 max-w-sm text-center border-neon-blue/20 shadow-neon-blue animate-fade-in">
                    <i class="fas fa-circle-question text-4xl text-neon-blue mb-4 animate-bounce"></i>
                    <h3 class="text-xl font-bold text-white mb-2">${title}</h3>
                    <p class="text-gray-400 text-sm mb-6">${message}</p>
                    <div class="flex gap-3">
                        <button onclick="ModalSystem.hide()" class="flex-1 py-2.5 rounded-xl border border-white/10 text-gray-400 hover:text-white hover:bg-white/5 font-semibold transition-colors">Batal</button>
                        <button id="confirm-btn-trigger" class="flex-1 py-2.5 rounded-xl bg-neon-blue text-coffee-900 font-black hover:shadow-neon-blue-hover transition-all">Konfirmasi</button>
                    </div>
                </div>
            `);
            document.getElementById('confirm-btn-trigger').onclick = () => {
                ModalSystem.hide();
                onConfirm();
            };
        }

        /**
         * ==========================================
         * TATA KELOLA STATUS MEJA (TABLE STATUS STORAGE)
         * ==========================================
         */
        const TableStatusManager = {
            getStatus: function(tableId) {
                return localStorage.getItem(`byod_table_status_${tableId}`) || 'vacant';
            },
            setStatus: function(tableId, status) {
                localStorage.setItem(`byod_table_status_${tableId}`, status);
            }
        };

        /**
         * ==========================================
         * 2. STATE MANAGEMENT & AUTO-CREATE DATABASE
         * ==========================================
         */
        const DatabaseManager = {
            dbKey: APP_ID + '_local_db',
            
            init: function() {
                let localData = localStorage.getItem(this.dbKey);
                if (!localData) {
                    const defaultDB = {
                        settings: {
                            storeName: 'Kasir Mandiri Kiosk', 
                            storeSlogan: 'Sistem Pemesanan Cepat & Mudah', 
                            adminPin: '1234',
                            taxRate: 0.10,
                            numTables: 12,
                            webhookKitchen: '', 
                            webhookCashier: '',
                            driveSyncLink: '',
                            storeStatus: 'open', 
                            promos: [
                                "https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=800&q=80",
                                "https://images.unsplash.com/photo-1514432324607-a09d9b4aefdd?auto=format&fit=crop&w=800&q=80"
                            ]
                        },
                        categories: ['Minuman', 'Makanan', 'Snack'],
                        products: [
                            { id: 'P01', name: 'Signature Coffee Aren', price: 25000, category: 'Minuman', status: 'ready', image: 'fa-mug-hot' },
                            { id: 'P02', name: 'Cyber Matcha Latte', price: 28000, category: 'Minuman', status: 'ready', image: 'fa-glass-water' },
                            { id: 'P03', name: 'Nasi Goreng Wagyu', price: 45000, category: 'Makanan', status: 'ready', image: 'fa-bowl-food' },
                            { id: 'P04', name: 'Truffle French Fries', price: 22000, category: 'Snack', status: 'ready', image: 'fa-plate-wheat' },
                            { id: 'P05', name: 'Neon Citrus Mojito', price: 24000, category: 'Minuman', status: 'habis', image: 'fa-martini-glass-citrus' },
                            { id: 'P06', name: 'Spaghetti Carbonara', price: 38000, category: 'Makanan', status: 'ready', image: 'fa-utensils' }
                        ],
                        activeOrders: [],
                        orderHistory: []
                    };
                    this.save(defaultDB);
                    return defaultDB;
                }
                
                let parsed = JSON.parse(localData);
                if (!parsed.categories) {
                    parsed.categories = ['Minuman', 'Makanan', 'Snack'];
                    this.save(parsed);
                }
                if (!parsed.settings.storeStatus) {
                    parsed.settings.storeStatus = 'open';
                    this.save(parsed);
                }
                if (!parsed.settings.promos) {
                    parsed.settings.promos = [
                        "https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=800&q=80",
                        "https://images.unsplash.com/photo-1514432324607-a09d9b4aefdd?auto=format&fit=crop&w=800&q=80"
                    ];
                    this.save(parsed);
                }
                return parsed;
            },
            save: function(dataObj) {
                localStorage.setItem(this.dbKey, JSON.stringify(dataObj));
            },
            syncState: function() {
                this.save({
                    settings: AppState.settings,
                    categories: AppState.categories,
                    products: AppState.products,
                    activeOrders: AppState.activeOrders,
                    orderHistory: AppState.orderHistory
                });
            }
        };

        const savedDB = DatabaseManager.init();
        const licenseMeta = JSON.parse(localStorage.getItem(APP_ID + '_license_meta') || '{}');
        const AppState = {
            settings: savedDB.settings,
            categories: savedDB.categories || ['Minuman', 'Makanan', 'Snack'],
            products: savedDB.products,
            activeOrders: savedDB.activeOrders || [],
            orderHistory: savedDB.orderHistory || [],
            cart: [],
            currentTable: null,
            viewMode: 'landing',
            store_reg_name: licenseMeta.regName || 'kasirmandiri_ukm' 
        };

        if (!AppState.settings.promos) {
            AppState.settings.promos = [
                "https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=800&q=80",
                "https://images.unsplash.com/photo-1514432324607-a09d9b4aefdd?auto=format&fit=crop&w=800&q=80"
            ];
        }

        const formatRp = (num) => 'Rp ' + num.toLocaleString('id-ID');

        /**
         * ==========================================
         * 3. OFF-LINE SECURITY & ANTI-FRAUD ENGINE
         * ==========================================
         */
        const SecuritySystem = {
            activationKey: APP_ID + '_is_activated',
            pwdKey: APP_ID + '_kasir_password',
            timeKey: APP_ID + '_last_transaction_date',
            loginDateKey: APP_ID + '_last_login_date',
            licenseMetaKey: APP_ID + '_license_meta',

            generateHash: async function(message) {
                const msgBuffer = new TextEncoder().encode(message);
                const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            },

            parseDateDDMMYYYY: function(str) {
                if(!str || str.length !== 8) return new Date(0);
                const d = parseInt(str.substring(0,2));
                const m = parseInt(str.substring(2,4)) - 1;
                const y = parseInt(str.substring(4,8));
                return new Date(y, m, d, 23, 59, 59);
            },

            updateLastTransaction: function() {
                localStorage.setItem(this.timeKey, Date.now().toString());
            },

            checkTimeFraud: function() {
                const lastDate = localStorage.getItem(this.timeKey);
                const now = Date.now();
                if (lastDate && now < parseInt(lastDate)) return false;
                return true;
            },

            lifecycleCheck: async function() {
                if (BYPASS_LICENSE_FOR_PREVIEW) {
                    console.warn("SISTEM PRATINJAU: Gerbang lisensi bypass aktif.");
                    return true;
                }

                if (!this.checkTimeFraud()) {
                    this.renderBlockScreen("PELANGGARAN SISTEM TERDETEKSI", "Sistem mendeteksi indikasi manipulasi waktu pada sistem operasi. Akses diblokir.");
                    return false;
                }

                const isActivated = localStorage.getItem(this.activationKey);
                if (isActivated !== 'true') {
                    this.renderActivationScreen();
                    return false;
                }

                const meta = JSON.parse(localStorage.getItem(this.licenseMetaKey) || '{}');
                const start = this.parseDateDDMMYYYY(meta.startDate || '');
                const end = this.parseDateDDMMYYYY(meta.endDate || '');
                start.setHours(0,0,0,0);
                
                const now = new Date();
                if (now.getTime() < start.getTime() || now.getTime() > end.getTime()) {
                    this.renderBlockScreen("MASA AKTIF LISENSI HABIS", `Lisensi berakhir (${meta.startDate} s/d ${meta.endDate}).`);
                    return false;
                }

                const todayStr = new Date().toDateString();
                const lastLogin = localStorage.getItem(this.loginDateKey);
                
                if (lastLogin !== todayStr) {
                    this.renderDailyLoginScreen();
                    return false;
                }

                return true;
            },

            prosesAktivasi: async function() {
                const regName = document.getElementById('act-regname').value.toLowerCase().replace(/[^a-z0-9]/g, '');
                const start = document.getElementById('act-start').value;
                const end = document.getElementById('act-end').value;
                const code = document.getElementById('act-code').value.toUpperCase().trim();

                if(!regName || !start || !end || !code) {
                    showCustomToast("Seluruh kolom wajib diisi!", "error"); return;
                }

                const rawString = `${regName}${start}${end}${SALT_KEY}`;
                const fullHash = await this.generateHash(rawString);
                const validCode = fullHash.substring(0, 12).toUpperCase();

                if (code === validCode) {
                    localStorage.setItem(this.activationKey, 'true');
                    localStorage.setItem(this.pwdKey, validCode);
                    localStorage.setItem(this.licenseMetaKey, JSON.stringify({ regName: regName, startDate: start, endDate: end }));
                    localStorage.setItem(this.loginDateKey, new Date().toDateString());
                    
                    AppState.store_reg_name = regName; 
                    
                    showCustomToast("Aktivasi Sukses!");
                    setTimeout(() => initRouter(), 1500);
                } else {
                    showCustomToast("KODE LISENSI TIDAK VALID!", "error");
                }
            },

            prosesDailyLogin: function() {
                const inputPwd = document.getElementById('daily-pwd').value.toUpperCase().trim();
                const storedPwd = localStorage.getItem(this.pwdKey);

                if (inputPwd === storedPwd) {
                    localStorage.setItem(this.loginDateKey, new Date().toDateString());
                    initRouter();
                } else {
                    showCustomToast("Password Salah!", "error");
                }
            },

            renderActivationScreen: function() {
                const app = document.getElementById('app');
                app.innerHTML = `
                    <div class="h-screen w-screen bg-coffee-900 flex items-center justify-center p-6 relative overflow-hidden">
                        <div class="glass-panel p-8 rounded-3xl max-w-lg w-full text-center z-10 animate-fade-in shadow-neon-blue border border-neon-blue/20">
                            <h2 class="text-2xl font-black text-white mb-2 tracking-wide uppercase">Aktivasi <span class="text-neon-blue">POS Mandiri</span></h2>
                            <p class="text-sm text-gray-400 mb-6 border-b border-white/5 pb-4">Masukan detail registrasi offline Anda.</p>
                            <div class="space-y-4 text-left">
                                <div>
                                    <label class="text-xs text-gray-400 uppercase font-bold tracking-wider">Nama Registrasi (ID Tenant)</label>
                                    <input type="text" id="act-regname" placeholder="Contoh: kasirmandiri" oninput="this.value = this.value.toLowerCase().replace(/[^a-z0-9]/g, '')" class="glow-input w-full bg-black border border-neon-blue/20 rounded-xl px-4 py-3 text-neon-blue font-mono tracking-wider focus:outline-none lowercase">
                                </div>
                                <div class="grid grid-cols-2 gap-4">
                                    <div><label class="text-xs text-gray-400 uppercase font-bold tracking-wider">Mulai (DDMMYYYY)</label><input type="number" id="act-start" placeholder="01012026" class="glow-input w-full bg-coffee-800 border border-white/10 rounded-xl px-3 py-2 text-white focus:outline-none"></div>
                                    <div><label class="text-xs text-gray-400 uppercase font-bold tracking-wider">Berakhir (DDMMYYYY)</label><input type="number" id="act-end" placeholder="31122026" class="glow-input w-full bg-coffee-800 border border-white/10 rounded-xl px-3 py-2 text-white focus:outline-none"></div>
                                </div>
                                <div><label class="text-xs text-neon-blue font-bold uppercase tracking-wider">Kode Lisensi (12-Digit)</label><input type="text" id="act-code" placeholder="KODE LISENSI" class="w-full bg-black border border-neon-blue/50 rounded-lg px-3 py-3 text-white tracking-widest font-mono text-center uppercase focus:outline-none"></div>
                            </div>
                            <button onclick="SecuritySystem.prosesAktivasi()" class="w-full mt-8 py-3 rounded-xl bg-neon-blue text-coffee-900 font-bold hover:shadow-neon-blue-hover transition-all">AKTIVASI PERANGKAT</button>
                        </div>
                    </div>
                `;
            },

            renderDailyLoginScreen: function() {
                const app = document.getElementById('app');
                app.innerHTML = `
                    <div class="h-screen w-screen bg-coffee-900 flex items-center justify-center p-6 relative overflow-hidden">
                        <div class="glass-panel p-8 rounded-3xl max-w-sm w-full text-center animate-fade-in shadow-neon-blue border border-neon-blue/20">
                            <i class="fas fa-lock text-5xl text-neon-blue mb-4 animate-bounce"></i>
                            <h2 class="text-2xl font-bold text-white mb-2">Login Kasir</h2>
                            <input type="password" id="daily-pwd" placeholder="KODE LISENSI" class="w-full bg-black border border-white/15 rounded-xl px-4 py-3 text-center text-neon-blue tracking-widest font-mono mb-6 focus:outline-none focus:border-neon-blue uppercase">
                            <button onclick="SecuritySystem.prosesDailyLogin()" class="w-full py-3 rounded-xl bg-neon-blue text-coffee-900 font-bold hover:shadow-neon-blue-hover transition-all">BUKA AKSES SISTEM</button>
                        </div>
                    </div>
                `;
            },

            renderBlockScreen: function(title, message) {
                document.getElementById('app').innerHTML = `
                    <div class="h-screen w-screen bg-red-950 flex flex-col items-center justify-center p-8 z-50 fixed inset-0">
                        <h1 class="text-3xl font-black text-white mb-4 text-center">${title}</h1>
                        <p class="text-red-200 text-center max-w-2xl border border-red-500/30 bg-red-950/40 p-6 rounded-xl">${message}</p>
                    </div>
                `;
            }
        };

        /**
         * ==========================================
         * 4. ONE-TIME SESSION LOCKER (BYOD LOGIC)
         * ==========================================
         */
        const SessionLocker = {
            isLocked: function(tableId) {
                return localStorage.getItem(`byod_lock_${tableId}`) === 'true';
            },
            lock: function(tableId) {
                localStorage.setItem(`byod_lock_${tableId}`, 'true');
            },
            unlock: function(tableId) {
                localStorage.removeItem(`byod_lock_${tableId}`);
            }
        };

        /**
         * ==========================================
         * 5. SINKRONISASI CLOUDFLARE WORKER DATABASE
         * ==========================================
         */
        async function syncToCloud(action, payload) {
            const token = localStorage.getItem(SecuritySystem.pwdKey) || "PREVIEW_TOKEN";
            try {
                // Berkomunikasi langsung lintas domain ke URL API Worker Cloudflare utama Anda
                const response = await fetch(API_BASE_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        app_id: APP_ID,
                        store_reg_name: AppState.store_reg_name,
                        auth_token: token,
                        action: action,
                        payload: payload
                    })
                });
                return await response.json();
            } catch (err) {
                console.warn("Cloud Sync offline / gagal. Transaksi disimpan secara lokal.", err);
                return { error: err.message };
            }
        }

        const BackupManager = {
            exportJSON: function() {
                const currentDB = localStorage.getItem(DatabaseManager.dbKey);
                if(!currentDB) return showCustomToast("Database kosong!", "error");
                
                const blob = new Blob([currentDB], {type: 'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Backup_POS_${new Date().toISOString().slice(0,10)}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showCustomToast("Database berhasil diekspor!");
            },
            
            importJSON: function(event) {
                const file = event.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const data = JSON.parse(e.target.result);
                        if(data.settings && data.products) {
                            DatabaseManager.save(data);
                            showCustomToast("Database dipulihkan!");
                            setTimeout(() => window.location.reload(), 1200);
                        } else {
                            showCustomToast("Format JSON salah.", "error");
                        }
                    } catch (err) {
                        showCustomToast("Gagal membaca file JSON.", "error");
                    }
                };
                reader.readAsText(file);
            }
        };

        /**
         * ==========================================
         * 6. ROUTING & URL PARAMETER PARSING
         * ==========================================
         */
        function initRouter() {
            const params = new URLSearchParams(window.location.search);
            if (params.has('view') && params.get('view') === 'admin') {
                navigateTo('admin');
            } else if (params.has('table')) {
                navigateTo('table', params.get('table'));
            } else {
                navigateTo('landing');
            }
        }

        function navigateTo(mode, payload) {
            try {
                if (mode === 'admin') {
                    AppState.viewMode = 'admin';
                    history.pushState(null, '', '?view=admin');
                    renderAdminLogin();
                } else if (mode === 'table') {
                    AppState.viewMode = 'customer';
                    AppState.currentTable = payload;
                    history.pushState(null, '', '?table=' + payload);
                    
                    if (AppState.settings.storeStatus === 'closed') {
                        renderStoreClosedScreen();
                        return;
                    }

                    if (TableStatusManager.getStatus(payload) === 'vacant') {
                        TableStatusManager.setStatus(payload, 'ordering');
                    }
                    
                    if (SessionLocker.isLocked(payload)) {
                        renderLockedBYODScreen(payload);
                    } else {
                        renderCustomerKiosk();
                    }
                } else {
                    AppState.viewMode = 'landing';
                    history.pushState(null, '', window.location.pathname || '/');
                    renderLandingPage();
                }
            } catch (e) {
                if (mode === 'admin') { AppState.viewMode = 'admin'; renderAdminLogin(); }
                else if (mode === 'table') { AppState.viewMode = 'customer'; AppState.currentTable = payload; renderCustomerKiosk(); }
                else { AppState.viewMode = 'landing'; renderLandingPage(); }
            }
        }

        function renderStoreClosedScreen() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="h-screen w-screen bg-coffee-900 flex flex-col items-center justify-center p-6 text-center">
                    <div class="glass-panel p-10 rounded-3xl max-w-sm w-full border-red-500/20 shadow-neon-blue">
                        <i class="fas fa-store-slash text-5xl text-red-500 mb-6"></i>
                        <h2 class="text-2xl font-black text-white uppercase tracking-wider mb-2">OUTLET TUTUP</h2>
                        <p class="text-gray-300 text-sm mb-8">Maaf, saat ini outlet kami sedang tutup. Silakan hubungi staf.</p>
                        <button onclick="navigateTo('landing')" class="w-full py-2.5 rounded-xl bg-white/5 text-white font-bold text-xs border border-white/10">Kembali</button>
                    </div>
                </div>
            `;
        }

        /**
         * ==========================================
         * 7. INTEGRASI TRANSAKSI WEBHOOKS & SUBMISSION
         * ==========================================
         */
        async function sendToDiscord(channel, payload) {
            const url = channel === 'kitchen' ? AppState.settings.webhookKitchen : AppState.settings.webhookCashier;
            if (!url) return;
            try {
                await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            } catch (error) { console.error(`Webhook Error:`, error); }
        }

        async function processOrderSubmission(customerEmail) {
            if (AppState.cart.length === 0) return;

            const timeNow = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            let kitchenItems = ''; let cashierItems = ''; let subtotal = 0;

            AppState.cart.forEach(item => {
                const product = AppState.products.find(p => p.id === item.id);
                if (product) {
                    subtotal += product.price * item.qty;
                    kitchenItems += `- ${item.qty}x ${product.name}\n`;
                    cashierItems += `- ${item.qty}x ${product.name} (@ ${formatRp(product.price)})\n`;
                }
            });

            const tax = subtotal * AppState.settings.taxRate;
            const totalFinal = subtotal + tax;
            const emailText = customerEmail ? customerEmail : "Tanpa Email Pelanggan";

            const kitchenPayload = { content: `🛎️ **PESANAN MASUK - MEJA ${AppState.currentTable}**\n${kitchenItems}--------------------------------------\n⏰ *Jam Order: ${timeNow}*\n📧 *Email:* ${emailText}` };
            const cashierPayload = { content: `💳 **TAGIHAN BARU - MEJA ${AppState.currentTable}**\n${cashierItems}--------------------------------------\nSubtotal: ${formatRp(subtotal)}\nPajak (${AppState.settings.taxRate * 100}%): ${formatRp(tax)}\n💰 **TOTAL TAGIHAN: ${formatRp(totalFinal)}**\n--------------------------------------\n📧 *Email:* ${emailText}\n⏰ *Status:* Antri Belum Bayar` };

            sendToDiscord('kitchen', kitchenPayload);
            sendToDiscord('cashier', cashierPayload);

            const newOrder = {
                id: 'ORD-' + Math.floor(Math.random() * 10000),
                table: AppState.currentTable,
                items: [...AppState.cart],
                total: totalFinal,
                time: timeNow,
                status: 'pending'
            };

            AppState.activeOrders.push(newOrder);

            const orderPayload = {
                order_id: newOrder.id,
                table_number: newOrder.table,
                total_amount: newOrder.total,
                order_time: newOrder.time,
                items: newOrder.items.map(item => {
                    const p = AppState.products.find(x => x.id === item.id);
                    return { id: item.id, name: p ? p.name : 'Menu', qty: item.qty, price: p ? p.price : 0 };
                })
            };
            
            // Lakukan sinkronisasi silang domain secara asinkron ke Cloudflare Worker
            syncToCloud('insert_order', orderPayload);

            SessionLocker.lock(AppState.currentTable);
            TableStatusManager.setStatus(AppState.currentTable, 'locked');

            SecuritySystem.updateLastTransaction();
            DatabaseManager.syncState();

            AppState.cart = [];
            showSuccessModal();
        }

        let promoIntervalId = null;
        function initPromoSlider() {
            if (promoIntervalId) clearInterval(promoIntervalId);
            const slides = document.querySelectorAll('.promo-slide');
            const dots = document.querySelectorAll('.promo-dot');
            if (slides.length <= 1) return;
            
            let currentIdx = 0;
            promoIntervalId = setInterval(() => {
                slides[currentIdx].classList.add('opacity-0');
                slides[currentIdx].classList.remove('opacity-100');
                slides[currentIdx].style.zIndex = 0;
                if (dots[currentIdx]) {
                    dots[currentIdx].classList.remove('bg-neon-blue');
                    dots[currentIdx].classList.add('bg-white/30');
                }
                
                currentIdx = (currentIdx + 1) % slides.length;
                
                slides[currentIdx].classList.remove('opacity-0');
                slides[currentIdx].classList.add('opacity-100');
                slides[currentIdx].style.zIndex = 10;
                if (dots[currentIdx]) {
                    dots[currentIdx].classList.add('bg-neon-blue');
                    dots[currentIdx].classList.remove('bg-white/30');
                }
            }, 5000);
        }

                                    <button onclick="copyTableLink()" class="px-3 py-2 bg-neon-blue text-coffee-900 rounded-xl text-xs font-bold hover:shadow-neon-blue transition-all"><i class="fas fa-copy"></i></button>
                                </div>
                                <p class="text-[10px] text-gray-500 mt-2">Salin link meja spesifik di atas, lalu tempel pada web pembuat QR Code gratis untuk dicetak menjadi stiker meja.</p>
                            </div>
                        </div>
                    </div>

                    <div class="flex justify-end gap-2">
                        <button onclick="BackupManager.exportJSON()" class="bg-coffee-800 text-white px-4 py-2 rounded-xl text-sm font-bold">Ekspor Database (.JSON)</button>
                        <button onclick="saveSettings()" class="bg-neon-blue text-coffee-900 px-6 py-2 rounded-xl text-sm font-bold">Simpan</button>
                    </div>
                </div>`;

            window.addNewPromoLink = () => {
                const url = document.getElementById('new-promo-url').value.trim();
                if (!url) return;
                if (!AppState.settings.promos) AppState.settings.promos = [];
                AppState.settings.promos.push(url);
                DatabaseManager.syncState();
                renderAdminSettings(container);
            };

            window.removePromoLink = (index) => {
                AppState.settings.promos.splice(index, 1);
                DatabaseManager.syncState();
                renderAdminSettings(container);
            };

            window.saveSettings = () => {
                AppState.settings.storeName = document.getElementById('setting-store-name').value || 'Cyber Brew';
                AppState.settings.numTables = parseInt(document.getElementById('setting-tables').value);
                DatabaseManager.syncState();
                showCustomToast('Pengaturan disimpan!');
                setTimeout(() => navigateTo('admin'), 1000);
            };

            window.copyLinkToClipboard = (text) => {
                const tempInput = document.createElement("input");
                tempInput.value = text;
                document.body.appendChild(tempInput);
                tempInput.select();
                document.execCommand("copy");
                document.body.removeChild(tempInput);
                showCustomToast("Link berhasil disalin!");
            };

            window.updateTableLink = () => {
                const base = window.location.origin + window.location.pathname;
                const sel = document.getElementById('qr-table-selector').value;
                document.getElementById('qr-table-link').value = base + "?table=" + sel;
            };

            window.copyTableLink = () => {
                window.copyLinkToClipboard(document.getElementById('qr-table-link').value);
            };
        }

        window.onload = async () => {
            // Registrasi Service Worker untuk PWA Offline
            if ('serviceWorker' in navigator) {
                // Check if the current protocol is supported (http or https)
                if (window.location.protocol === 'http:' || window.location.protocol === 'https:') {
                    try {
                        await navigator.serviceWorker.register('sw.js');
                        console.log('Service Worker terdaftar secara sukses untuk operasi PWA offline!');
                    } catch (e) {
                        console.error('Pendaftaran Service Worker gagal:', e);
                    }
                } else {
                    console.log('Registrasi Service Worker dilewati: Protokol tidak didukung (mis. dijalankan dari sistem file lokal atau preview).');
                }
            }

            const isSecure = await SecuritySystem.lifecycleCheck();
            if (isSecure) {
                initRouter();
            }
        };

    </script>
</body>
</html>
